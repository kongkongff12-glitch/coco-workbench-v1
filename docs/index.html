<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COCO 客户工作台</title>
<style>
/* 设计系统与 BD 工作台一致（姊妹站）。Codex 只改最下方 DB，不动渲染。 */
:root{
  --bg:#F6F3EC; --panel:#FFFFFF; --ink:#211C15; --sub:#7A7163; --faint:#A89E8E;
  --line:#E6DFD0; --line-dark:#D5CCB9;
  --green:#2E5E4E; --green-bg:#EAF1ED; --amber:#9A6B1F; --amber-bg:#F6EEDC;
  --gray:#8A8276; --gray-bg:#EFEBE2; --red:#B5432E; --red-bg:#F8E9E5;
  --blue:#3E5A7E; --blue-bg:#E8EEF5;
  --serif:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55}
a{color:inherit}
.app{display:flex;min-height:100vh}
.side{width:236px;flex-shrink:0;border-right:1px solid var(--line-dark);padding:26px 0 40px;position:sticky;top:0;height:100vh;overflow-y:auto}
.side .brand{padding:0 22px 16px;border-bottom:1px solid var(--line)}
.side .brand h1{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:.5px}
.side .brand .tagline{font-size:12px;color:var(--sub);margin-top:2px}
.side .brand .ver{font-size:11px;color:var(--faint);margin-top:7px}
.navgroup{padding:15px 12px 0}
.navgroup .glabel{font-size:11px;color:var(--faint);letter-spacing:2px;padding:0 10px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--sub);font-size:13.5px}
.nav-item:hover{background:#EFEAE0}
.nav-item.on{background:var(--ink);color:#F6F3EC}
.nav-item .cnt{margin-left:auto;font-size:11px;color:var(--faint)}
.nav-item.on .cnt{color:#CFC8B8}
.main{flex:1;min-width:0;padding:28px 36px 80px;max-width:1480px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:4px}
.crumb{font-size:12px;color:var(--faint)}
.crumb b{color:var(--sub);font-weight:500}
h2.pagetitle{font-family:var(--serif);font-size:32px;font-weight:800;letter-spacing:0;margin:6px 0 4px}
.pagedesc{color:var(--sub);font-size:14px;margin-bottom:18px;max-width:900px}

.kpis{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.kpi{background:var(--panel);border:1px solid var(--line);padding:13px 18px;min-width:120px;flex:1}
.kpi .v{font-family:var(--serif);font-size:25px;font-weight:700;line-height:1}
.kpi .l{font-size:11px;color:var(--sub);letter-spacing:.5px;margin-top:5px}
.kpi.good .v{color:var(--green)}

.stagebar{display:flex;border:1px solid var(--line);background:var(--panel);margin-bottom:8px}
.stg{flex:1;text-align:center;padding:10px 6px;font-size:12.5px;color:var(--faint);border-right:1px solid var(--line)}
.stg:last-child{border-right:none}.stg.done{background:var(--green-bg);color:var(--green)}
.stg.now{background:var(--ink);color:#F6F3EC;font-weight:600}.stg .d{display:block;font-size:10px;opacity:.82;margin-top:2px}

.oneliner{border-left:5px solid var(--red);background:var(--panel);padding:14px 18px;margin-bottom:18px;font-family:var(--sans);font-size:20px;font-weight:700;line-height:1.45}
.oneliner.empty{border-left-color:var(--faint);color:var(--faint);font-family:var(--sans);font-size:13.5px}
.oneliner .who{font-family:var(--sans);font-size:11px;color:var(--faint);margin-top:6px}

.tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.tag.hi{background:var(--green-bg);color:var(--green)}.tag.mid{background:var(--amber-bg);color:var(--amber)}
.tag.lo{background:var(--gray-bg);color:var(--gray)}.tag.soft{background:var(--red-bg);color:var(--red)}
.tag.fresh{background:var(--blue-bg);color:var(--blue)}.tag.tbd{background:transparent;border:1px dashed var(--line-dark);color:var(--faint)}
.tag.auto{background:var(--blue-bg);color:var(--blue)}.tag.ok{background:var(--green-bg);color:var(--green)}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;flex-shrink:0;vertical-align:middle}
.who-inline{display:inline-flex;align-items:center;gap:6px}
.small{font-size:12px;color:var(--sub)} .muted{color:var(--faint)}
.linkchip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 9px;border-radius:4px;background:var(--blue-bg);color:var(--blue);text-decoration:none;cursor:pointer}
.linkchip:hover{text-decoration:underline}

.sec{margin-bottom:26px}
.sec>.shead{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:7px;margin-bottom:13px}
.sec>.shead .num{font-family:var(--serif);font-size:14px;color:var(--faint);font-weight:700}
.sec>.shead h3{font-family:var(--serif);font-size:16px;font-weight:700}
.sec>.shead .hint{margin-left:auto;font-size:12px;color:var(--faint)}

table.t{width:100%;border-collapse:collapse;background:var(--panel)}
table.t th{font-size:11px;color:var(--faint);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--line);letter-spacing:1px;white-space:nowrap}
table.t td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px}
table.t tr:hover td{background:#FBF9F4}
.q{font-family:var(--serif);font-size:13.5px;color:#3a352c}

/* 白板：当前态 + 周时间线 + 选中周 */
.boardlayout{display:grid;grid-template-columns:160px 1fr;gap:18px;align-items:start}
.wktl{border-left:1px solid var(--line);position:sticky;top:18px;max-height:calc(100vh - 36px);overflow:auto;padding-right:4px}
.wktl .wk{position:relative;padding:8px 8px 8px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
.wktl .wk:hover{background:#FBF9F4}
.wktl .wk.on{background:var(--ink)}
.wktl .wk.on .d,.wktl .wk.on .t,.wktl .wk.on .one{color:#F6F3EC}
.wktl .wk::before{content:"";position:absolute;left:-5px;top:14px;width:9px;height:9px;border-radius:50%;background:var(--line-dark)}
.wktl .wk.on::before{background:var(--red);box-shadow:0 0 0 3px var(--red-bg)}
.wktl .wk .d{font-family:var(--serif);font-size:15px;font-weight:700;line-height:1.2}
.wktl .wk .t{font-size:12px;color:var(--sub);line-height:1.35;margin-top:2px}
.wktl .wk .one{font-size:11px;color:var(--faint);margin-top:2px;display:none;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.wktl .wk.on .one{display:-webkit-box}
.wktl .wk .reddot{color:var(--red);font-size:10px;margin-left:4px}
.wktl .wk.draft::before{background:var(--amber);box-shadow:0 0 0 3px var(--amber-bg)}
.wktl .wk.draft .d::after{content:"待确认";display:inline-block;margin-left:6px;font-family:var(--sans);font-size:10px;color:var(--amber);border:1px solid var(--amber);border-radius:99px;padding:0 5px;vertical-align:1px}
.wktl .wk.draft.on .d::after{color:#F6F3EC;border-color:#F6F3EC}
.wkpanel{min-width:0}
.wkhead{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.wkhead .wd{font-family:var(--serif);font-size:22px;font-weight:700}

.blocker{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);padding:11px 15px;margin-bottom:7px}
.blocker.client{border-left-color:var(--blue)}
.blocker .bi{font-size:13.5px;margin-bottom:4px}
.blocker .need{font-size:12px;font-weight:600;color:var(--amber)}.blocker.client .need{color:var(--blue)}
.psychcard{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--red);border-radius:8px;padding:14px 16px;margin:0 0 16px}
.psychhead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:7px}
.psychhead span{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--red)}
.psychhead small{font-size:12px;color:var(--faint)}
.psychsummary{font-size:15px;line-height:1.75;margin-bottom:10px}
.psygrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.psyitem{background:#FBF9F4;border:1px solid var(--line);border-radius:6px;padding:9px 11px}
.psyitem .pyt{font-weight:700;font-size:13.5px;line-height:1.45}
.psyitem .pyd{font-size:12px;color:var(--sub);line-height:1.55;margin-top:4px}
.mindhero{background:var(--panel);border:2px solid var(--ink);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.mindhero h3{font-size:24px;color:var(--red);font-weight:900;margin-bottom:8px}
.mindhero p{font-size:16px;font-weight:700;line-height:1.6}
.mindtimeline{display:grid;gap:12px;margin-bottom:18px}
.mindstage{background:var(--panel);border:1px solid var(--line);border-left:6px solid var(--red);border-radius:10px;padding:13px 15px;display:grid;grid-template-columns:88px 1fr;gap:14px}
.mindstage .md{font-size:20px;font-weight:900;color:var(--ink);line-height:1}
.mindstage .mt{font-size:18px;font-weight:900;color:var(--red);margin-bottom:5px}
.mindstage .ms{font-size:14px;line-height:1.55;color:var(--ink);font-weight:700}
.mindstage .mr{font-size:13px;line-height:1.55;color:var(--sub);margin-top:6px}
.mindsource{display:flex;flex-wrap:wrap;gap:6px;margin:7px 0}
.mindsource span{font-size:11px;font-weight:900;color:var(--blue);background:var(--blue-bg);border-radius:999px;padding:2px 8px}
.minddetail{margin-top:8px;background:#FBF9F4;border:1px solid var(--line);border-radius:8px;padding:9px 11px}
.minddetail .dl{font-size:12px;color:var(--red);font-weight:900;margin-bottom:4px}
.minddetail .dv{font-size:13px;color:var(--ink);line-height:1.55;font-weight:700}
.mindgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mindbox{background:var(--panel);border:2px solid var(--ink);border-radius:14px;padding:15px 17px}
.mindbox h3{font-size:20px;color:var(--red);font-weight:900;margin-bottom:8px}
.mindbox ul{list-style:none}
.mindbox li{padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px;line-height:1.5;font-weight:700}
.mindbox li:last-child{border-bottom:none}
.source-note{margin:-4px 0 14px;border:1px solid var(--line);background:#FBF9F4;border-radius:6px;padding:8px 11px;font-size:12px;color:var(--sub)}
.source-note summary{cursor:pointer;color:var(--amber);font-weight:600}
.source-note div{margin-top:6px;line-height:1.6}
.source-note .row2{display:grid;grid-template-columns:1fr 1.4fr;gap:12px;margin-top:0}
.source-note label{display:block;font-size:12px;color:var(--sub);font-weight:900;margin-bottom:5px}
.source-note select,.source-note input{width:100%;border:1px solid var(--line-dark);background:#fff;border-radius:6px;padding:8px 10px;color:var(--ink);font-family:var(--sans)}
.linegroup{margin-bottom:14px}
.linegroup .lh{font-family:var(--serif);font-size:13.5px;font-weight:700;padding:5px 0;display:flex;gap:8px;align-items:center}
.linegroup .lh .pri{font-size:11px;color:var(--faint);font-weight:400}
.delivery{background:var(--panel);border:1px solid var(--line);padding:9px 13px;margin-bottom:5px;display:flex;align-items:center;gap:10px}
.delivery .grow{flex:1} .delivery .dt{font-size:11px;color:var(--faint)}
.emptyline{font-size:12px;color:var(--red);background:var(--red-bg);padding:7px 13px;border-radius:4px}
.metricgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.metric{background:var(--panel);border:1px solid var(--line);padding:13px 15px}
.metric .ml{font-size:11px;color:var(--sub);margin-bottom:6px;display:flex;justify-content:space-between;gap:6px}
.metric .rowm{display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
.metric .v{font-family:var(--serif);font-size:24px;font-weight:700;line-height:1}
.metric .delta{font-size:12px;font-weight:600}.metric .delta.up{color:var(--green)}.metric .delta.dn{color:var(--red)}
.metric .prev{font-size:11px;color:var(--faint);margin-top:5px} .metric .foot{margin-top:8px}
.metric.stale{opacity:.7}.metric.stale .v{color:var(--faint)}
.plan{list-style:none}.plan li{background:var(--panel);border:1px solid var(--line);padding:9px 13px;margin-bottom:5px;font-size:13.5px}
.ask{list-style:none}.ask li{padding:6px 0;border-bottom:1px dashed var(--line);font-size:13.5px}.ask li::before{content:"？ ";color:var(--red);font-weight:700}
.archive{border:1px solid var(--line);background:var(--panel);padding:13px 15px}
.shotwall{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:9px}
.shot{background:var(--gray-bg);border:1px solid var(--line);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;text-align:center;font-size:10.5px;color:var(--sub);padding:7px}

/* 全客户总览 */
.cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.ccard{background:var(--panel);border:1px solid var(--line);padding:16px 18px;cursor:pointer}
.ccard:hover{border-color:var(--ink)}
.ccard.dim{opacity:.55;cursor:default}
.ccard .ct{display:flex;align-items:baseline;justify-content:space-between}
.ccard .cn{font-family:var(--serif);font-size:18px;font-weight:700}
.ccard .cf{font-size:12px;color:var(--sub)}
.ccard .cone{font-size:12.5px;color:var(--sub);margin:8px 0;min-height:34px}
.ccard .cmeta{display:flex;gap:12px;font-size:11px;color:var(--faint);align-items:center}
.ccard .rf{color:var(--red);font-weight:600}

/* 对接负责人总览 */
.contact-page-title{font-size:18px;font-weight:900;margin-bottom:10px;color:var(--ink)}
.contact-page-title small{font-size:12px;color:var(--sub);font-weight:700;margin-left:8px}
.contact-hero{background:var(--panel);border:1px solid var(--line-dark);border-top:2px solid var(--ink);padding:24px 28px;margin-bottom:20px;display:grid;grid-template-columns:64px 1fr auto;align-items:center;gap:18px}
.contact-avatar{width:42px;height:42px;border-radius:50%;background:var(--green-bg);border:2px solid #fff;box-shadow:0 0 0 1px var(--line-dark);display:inline-flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:900;color:var(--green);flex-shrink:0;background-size:cover;background-position:center}
.contact-avatar.has-photo{color:transparent}
.contact-avatar.lg{width:58px;height:58px;font-size:22px}
.contact-hero h3{font-family:var(--serif);font-size:28px;line-height:1.15;margin-bottom:8px}
.contact-hero .desc{font-size:14px;color:var(--sub);line-height:1.65}
.contact-hero .lead-name{font-size:15px;font-weight:900;margin-top:3px}
.contact-tag{display:inline-block;font-size:12px;color:#fff;background:var(--ink);border-radius:999px;padding:3px 10px;font-weight:900}
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px}
.team-card{background:#F6F2E9;border:1px solid var(--line-dark);padding:20px 18px;min-height:360px;display:flex;flex-direction:column}
.team-card h3{font-family:var(--serif);font-size:20px;margin-bottom:12px}
.team-card .team-tip{font-size:14px;color:var(--sub);line-height:1.75;margin-bottom:auto}
.member-list{display:flex;flex-direction:column;gap:11px;border-top:1px dashed var(--line-dark);padding-top:18px;margin-top:26px}
.member-row{display:flex;align-items:center;gap:9px;font-size:13px}
.member-row b{font-weight:900;font-size:15px}
.member-row small{display:block;font-size:12px;color:var(--sub);line-height:1.35;margin-top:1px}
.hours-table{border:1px solid var(--line-dark);background:#F6F2E9;margin:0 0 24px}
.hour-row{display:grid;grid-template-columns:110px 1fr;border-bottom:1px solid var(--line)}
.hour-row:last-child{border-bottom:none}
.hour-row .hl{padding:12px 16px;font-size:14px;font-weight:900;color:var(--ink)}
.hour-row .hv{padding:12px 16px;font-size:14px;color:var(--sub);font-weight:700}
.route-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.route-node{position:relative;background:var(--panel);border:1px solid var(--line-dark);padding:16px 14px;min-height:112px}
.route-node:not(:last-child)::after{content:"›";position:absolute;right:-13px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:26px}
.route-node .rt{font-size:13px;color:var(--sub);line-height:1.45;min-height:36px}
.route-node .rn{font-family:var(--serif);font-size:20px;font-weight:900;margin-top:15px;display:flex;align-items:center;gap:8px}

/* 社媒看板 */
.platgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.platcard{background:var(--panel);border:1px solid var(--line);padding:13px 15px}
.platcard .pn{font-family:var(--serif);font-size:14px;font-weight:700;margin-bottom:7px}
.platcard .pstats{display:flex;gap:16px;margin-bottom:7px}
.platcard .num{font-family:var(--serif);font-size:18px;font-weight:700}.platcard .lab{font-size:10px;color:var(--faint)}
.platlinks{display:flex;gap:6px;margin-top:7px}
.social-board{border:2px solid var(--ink);border-radius:14px;background:#fff;overflow:hidden;margin:16px 0 20px;box-shadow:0 1px 0 rgba(33,28,21,.05)}
.social-board-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;background:#F6F1E7;border-bottom:2px solid var(--ink);padding:16px 18px}
.social-board-title{font-size:22px;font-weight:900;font-family:var(--serif);line-height:1.25}
.social-board-title span{display:block;font-family:var(--sans);font-size:12px;color:var(--sub);font-weight:800;margin-top:4px}
.social-board-link{font-size:12px;color:var(--blue);font-weight:900;word-break:break-all;text-align:right}
.social-board-wrap{overflow-x:auto}
.social-table{width:100%;min-width:1040px;border-collapse:collapse}
.social-table th{background:#DDE7FF;color:#1F3558;font-size:12px;font-weight:900;text-align:left;padding:10px 12px;border-bottom:1px solid #B8C6E4;border-right:1px solid #B8C6E4;white-space:nowrap}
.social-table td{padding:9px 12px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:middle;font-size:13px}
.social-table tr.account-start td{border-top:2px solid var(--line-dark)}
.social-account{font-weight:900;line-height:1.35}
.social-account small{display:block;color:var(--sub);font-size:11px;font-weight:800;margin-top:3px}
.social-account.yellow{background:#FFF36B}.social-account.green{background:#BFE7AF}.social-account.blue{background:#DDE9FF}
.social-metric{font-weight:900;color:var(--red)}
.social-num{font-weight:900;font-variant-numeric:tabular-nums;white-space:nowrap}
.social-delta{font-size:12px;font-weight:900;white-space:nowrap}.social-delta.up{color:var(--green)}.social-delta.down{color:var(--red)}.social-delta.flat{color:var(--sub)}
.social-barcell{min-width:180px}.social-bar-bg{height:16px;background:#EEF1F8;border-radius:3px;overflow:hidden;display:flex}.social-bar-now{background:#7E97EA}.social-bar-prev{background:#B9C5F8}
.social-note{font-size:12px;color:var(--sub);line-height:1.45;min-width:220px}
.social-all-periods .social-board-title{font-size:20px}
.social-all-periods .social-board-wrap{max-height:760px;overflow:auto}
.social-all-periods .social-table{min-width:2120px}
.social-all-periods th,.social-all-periods td{font-size:12px}
.social-all-periods thead th{position:sticky;top:0;z-index:4}
.social-all-periods .social-account-sticky{position:sticky;left:0;z-index:3;width:250px;min-width:250px;max-width:250px;box-shadow:1px 0 0 var(--line)}
.social-all-periods .social-metric-sticky{position:sticky;left:250px;z-index:3;width:92px;min-width:92px;background:#fff;box-shadow:1px 0 0 var(--line);color:var(--ink)}
.social-all-periods .social-metric-sticky.is-bar{color:var(--red)}
.social-all-periods th.social-account-sticky,.social-all-periods th.social-metric-sticky{background:#DDE7FF;z-index:6}
.social-all-periods tr.account-start td{border-top:2px solid var(--line-dark)}
.social-all-periods .account-title{display:block;font-weight:900;line-height:1.35;white-space:normal;word-break:break-word}
.social-all-periods .account-meta{display:block;color:#72552b;font-size:11px;font-weight:800;line-height:1.45;margin-top:4px}

/* 甘特 */

.track{position:relative;min-height:46px;background:repeating-linear-gradient(to right,#FFFDF8 0,#FFFDF8 calc(100%/var(--c) - 1px),#DDD4C2 calc(100%/var(--c) - 1px),#DDD4C2 calc(100%/var(--c)))}
.bar{position:absolute;top:8px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.12)}
.bar.done{background:#2E7D5B;color:#fff}.bar.doing{background:#D85C32;color:#fff}.bar.plan{background:#3E6EA8;color:#fff}.bar.blocked{background:#B5432E;color:#fff}

.glegend{display:flex;gap:14px;font-size:12px;font-weight:800;color:var(--ink);margin-bottom:10px;flex-wrap:wrap}.glegend i{display:inline-block;width:18px;height:12px;border-radius:4px;margin-right:5px;vertical-align:-1px}

/* 时间线/动态流 */

.evt{font-size:10px;padding:1px 7px;border-radius:3px}.evt.deliver{background:var(--green-bg);color:var(--green)}.evt.req{background:var(--amber-bg);color:var(--amber)}.evt.metric{background:var(--blue-bg);color:var(--blue)}.evt.file{background:var(--gray-bg);color:var(--sub)}

/* ================= data.js 适配层：保留手工白板，接入真实资料库 ================= */
(function hydrateFromDataJs(){
 const raw=window.WORKBENCH_DATA;
 if(!raw||!raw.meta)return;
 const arr=v=>Array.isArray(v)?v:[];
 const date=v=>String(v||"").slice(0,10);
 const compactDate=v=>date(v).slice(5)||String(v||"");
 const firstLine=v=>String(v||"").split(/\n+/).find(Boolean)||"已从 data.js 导入，详情见数据中心。";
 const uniq=(items,key)=>{const seen=new Set();return items.filter(x=>{const k=key(x);if(seen.has(k))return false;seen.add(k);return true})};
 const palette=["#2E5E4E","#3E5A7E","#9A6B1F","#B5432E","#8A8276","#5b6b4e","#211C15","#7A7163","#46506b"];
 const teamMap={...DB.team};
 arr(raw.team).forEach((p,i)=>{if(p&&p.name)teamMap[p.name]=teamMap[p.name]||palette[i%palette.length]});
 DB.team=teamMap;
 DB.meta={...DB.meta, sourceNote:raw.meta.sourceNote||DB.meta.sourceNote, dataGeneratedAt:raw.meta.generatedAt||""};

 const coco=arr(DB.clients).find(c=>c.name===(raw.meta.client||"COCO"));
 if(coco){
   coco.fee=raw.meta.fee||coco.fee;
   coco.lead=raw.meta.lead||coco.lead;
   coco.one=arr(raw.board&&raw.board.conclusion)[0]||coco.one;
   coco.red=arr(raw.requests).filter(r=>String(r.status||"").includes("待")||String(r.status||"").includes("处理")).length||coco.red;
 }

 if(arr(raw.team).length){
   DB.roster={
    lead:raw.meta.lead||DB.roster.lead,
    reviewer:raw.meta.reviewer||DB.roster.reviewer,
    members:arr(raw.team).map(p=>({name:p.name,role:arr(p.roles).join(" · ")||"成员",group:p.group||""})),
    helpers:arr(DB.roster.helpers),
    left:arr(DB.roster.left)
   };
 }

 const toMetric=m=>{
   const series=arr(m.series).map(Number).filter(Number.isFinite);
   const cur=Number.isFinite(Number(m.value))?Number(m.value):(series.length?series[series.length-1]:0);
   const prev=Number.isFinite(Number(m.previous))?Number(m.previous):(series.length>1?series[series.length-2]:0);
   return {name:m.name||"指标",prev,cur,series:series.length?series:[prev,cur],src:m.src||"",srclabel:m.srclabel||"来源",owner:m.owner||"",top:Math.max(cur,prev,...(series.length?series:[0]))};
 };
 const weekly=key=>arr(raw.lineWeekly&&raw.lineWeekly[key]).map(x=>Number(x.count)||0);
 const metricsFor=line=>arr(raw.metrics).filter(m=>m.line===line||(!line&&m.line==="全局")).map(toMetric);
 if(arr(raw.lines).length){
   DB.data={...DB.data,lines:arr(raw.lines).map(L=>({
    label:L.label||L.key,
    primary:L.primary||"",
    weeks:weekly(L.key).length?weekly(L.key):[0],
    metrics:metricsFor(L.key).length?metricsFor(L.key):metricsFor("")
   }))};
 }

 const grouped={};
 arr(raw.deliverables).forEach(d=>{
   const line=d.line||"其他";
   (grouped[line]||(grouped[line]=[])).push({
    title:d.title||d.note||"未命名交付",
    owner:d.owner||"",
    date:date(d.date)||"",
    pub:d.pub?{plat:d.type||"链接",url:d.pub}:null
   });
 });
 Object.values(grouped).forEach(list=>list.sort((a,b)=>String(b.date).localeCompare(String(a.date))));

 if(DB.weeks&&DB.weeks[0]){
   const w=DB.weeks[0];
   if(Object.keys(grouped).length)w.deliveries=grouped;
   if(arr(raw.requests).length){
    const imported=arr(raw.requests).map(r=>({
     date:compactDate(r.date||r.updated),
     source:r.source||"data.js",
     quote:r.quote||r.text||"",
     status:r.status||"处理中",
     owner:r.owner||raw.meta.lead||"",
     resp:r.response||r.resp||""
    }));
    w.requests=uniq([...imported,...arr(w.requests)],r=>`${r.date}|${r.quote}`);
   }
   if(raw.board&&arr(raw.board.blockers).length){
    const imported=arr(raw.board.blockers).map(b=>({item:b.item||b.text||"",need:b.need||"",client:!!b.client,owner:b.owner||""}));
    w.blockers=uniq([...arr(w.blockers),...imported],b=>`${b.item}|${b.need}`);
   }
   if(raw.board&&arr(raw.board.nextWeek).length)w.nextWeek=arr(w.nextWeek).length?w.nextWeek:raw.board.nextWeek;
   if(arr(raw.metrics).length)w.metrics=arr(raw.metrics).map(toMetric);
   w.sourceLogic=[w.sourceLogic,raw.meta.sourceNote,`data.js：${arr(raw.deliverables).length} 条交付、${arr(raw.meetings).length} 次会议、${arr(raw.files).length} 个物料索引`].filter(Boolean).join("；");
 }

 const knownDates=new Set(arr(DB.weeks).map(w=>w.date));
 arr(raw.meetings).forEach(m=>{
   if(knownDates.has(m.date))return;
   DB.weeks.push({
    date:m.date,
    title:m.title||`COCO 周会 ${m.date}`,
    badge:"data.js",
    conclusion:firstLine(m.analysis),
    requests:[],
    deliveries:{},
    metrics:[],
    nextWeek:[],
    agenda:arr(m.points),
    shots:["data.js 会议记录","Notion 导入索引"]
   });
 });

 const feedItems=[
   ...arr(raw.actions).map(a=>({date:a.date,type:"req",who:a.owner||raw.meta.lead||"",text:a.task||"",line:a.priority||"行动"})),
   ...arr(raw.deliverables).map(d=>({date:d.date,type:"deliver",who:d.owner||"",text:d.title||d.note||"",line:d.line||d.type||"交付"}))
 ];
 if(feedItems.length)DB.feed=feedItems.sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,140);

 if(arr(raw.files).length){
   DB.files=arr(raw.files).slice(0,160).map(f=>({
    date:compactDate(f.date||raw.meta.weekStart),
    kind:f.kind||"资料",
    title:f.title||f.path||"未命名资料",
    vis:f.visibility||"内部"
   }));
  }
})();

const AUTH_HASH="667282499d40d5935c6b80672ea0a875477ada7b3b093aa2fc428f862216d3e0";
const AUTH_KEY="coco-workbench-auth-v5";
const APP_SHELL='<div class="app"><nav class="side" id="sidebar"></nav><main class="main" id="main"></main></div>';
const $=s=>document.querySelector(s);
let route="overview", selWeek=0;
let videoFilters={group:"全部",date:"全部"};
function mountAppShell(){ if(!document.querySelector("#sidebar")||!document.querySelector("#main")){ document.body.innerHTML=APP_SHELL; } }
function bytesToHex(buf){ return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join(""); }
async function passHash(v){ return bytesToHex(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v))); }
function showAuth(){
 document.body.innerHTML=`<div class="auth-screen"><div class="auth-card"><h1>COCO 客户工作台</h1><p>请输入访问密码。通过后会在本机保留登录状态。</p><input id="authPass" type="password" autocomplete="current-password" placeholder="访问密码"><button id="authBtn">进入工作台</button><div id="authError" class="auth-error"></div><p class="small muted" style="margin:6px 0 0">静态站密码门用于访问提示，不等同于服务端权限系统。</p></div></div>`;
 const input=document.querySelector("#authPass"), btn=document.querySelector("#authBtn"), err=document.querySelector("#authError");
 const tryUnlock=async()=>{ try{ if(await passHash((input.value||"").trim())===AUTH_HASH){ localStorage.setItem(AUTH_KEY,"1"); mountAppShell(); render(); } else { err.textContent="密码不对，请重新输入。"; input.select(); } }catch(e){ err.textContent="当前浏览器不支持本地密码校验，请使用 http://127.0.0.1 或 HTTPS 打开。"; } };
 btn.onclick=tryUnlock; input.onkeydown=e=>{ if(e.key==="Enter") tryUnlock(); }; setTimeout(()=>input.focus(),60);
}
function lockApp(){ mountAppShell(); render(); }
function bootWithAuth(){ mountAppShell(); render(); }

  {id:"chat-2026-06-16-21",title:"6月16日—6月21日群聊记录",kind:"群聊记录",date:"2026-06-16 至 2026-06-21",asset:"assets/sources/chat-2026-06-16-21-excerpts.md",excerpt:"# 6月16日—6月21日群聊记录归类摘录\n\n> 说明：本文件由用户在当前对话中上传的微信截图与粘贴文本整理，用于客户工作台的可点开来源。截图原件未逐一搬运进站点，本文件保留可审阅的原文摘录与日期索引。\n\n## 6月16日：女性客户画像、视频协作、Steve Nouri数据\n- 侯明真：Tiger 的视频各平台都发了，下面是朋友圈转发文案。\n- Charlie：最近感觉越来越明显，过去谈了20个客户18个是女性。\n- Charlie：女性在选ai产品的时候还是比较有眼光的。\n- Charlie：重运营、midtech、AI成了她们能力放大的翅膀，解决了她们因为不会写代码无法做产品的生产力瓶颈。\n- Charlie：女企业家出没的地方，我们都要出没。\n- 侯明真：以后把女企业的赛道全覆盖，以后都让她们用上COCO。\n- Charlie：女性企业家，可以共情，共鸣的爆款内容；superai大会算法没了，回到阵地战，需要爆款内容。\n- 侯明真给Charlie：Use Case / Demo 视频协作说明，说明三种配合方式。\n- Charlie提供Steve Nouri LinkedIn数据：480,829 impressions，266 total clicks，CTR 约0.06%，reactions 1,105，comments 85，reposts 21，saves 96。\n\n## 6月17日：KOL、信任层、品牌联合宣发\n- Charlie：KOL投放这个还是要有体系化的信任，品牌基础之后才可以。\n- Charlie：美国我们现在没品牌，没基础，直接作一个 genai 来拍，蛮难转化。\n- Charlie：看到“wtf is Coco”然后就跳走了。\n- Charlie：真正要赚美国人的SaaS软件的钱，想问题还是要更系统一些。\n- Charlie：微信公共号 + 推特推文，负责人和分工要明确，什么时候可以回复消息。\n- Will：美国有关美国的漏斗，要多参考优秀2B竞品的冷启动。\n\n## 6月18日：会议白板、SEO、任务拆解\n- 会议主题：Will × COCO MKT会议，会议时间 2026/6/18 13:00-14:00，中国标准时间。\n- 白板：COCO英赛网站优化、KOL投放数据、具体做法、视频剪辑、SEO本周进展、社媒数据看板、本周视频发布情况、SuperAI收尾内容发布总结。\n- SEO问题：官网实时渲染不是HTML导致抓取困难；About canonical、URL结构、404、docs子域结构等是技术债，需要Kevin介入。\n- Will团队待办：Steve Nouri转化漏斗复盘、竞品看板扩充、Deal/Ins内容模板复盘、女性创业者文章重写发布、P0评论回复、视频录制问题对接、SEO todo list跟进。\n- COCO团队待办：补充5-10个TOB竞品、整理GA数据、P0评论话术、MCN榜单skill、SEO官网技术债修复、Eric配合产品使用问题对接。\n\n## 6月19日：知外文化案例视频与女性企业家内容\n- 侯明真：6.19 知外文化案例视频各平台都发了，下面是朋友圈转发文案。\n- 侯明真总结：大多数人用AI还是当员工在用，知外文化是120个人配26个AI，一起做营销；她们在COCO上把AI当合伙人。\n- Charlie：爆款文章，女性老板要看的文章；每天谈的客户和渠道都是美女企业家老板。\n- Charlie：COCO过去按数据统计，见了40个客户/客户渠道，37个是女性。\n- Charlie：COCO最大机会是让一大堆女性企业家、职场实力女高管，midtech、not AI native，可以通过COCO改变自己的职业工作生涯。\n- 梦雨：小红书干活分享 + 案例视频 + Demo直播 + 社群转私域流量/线下 -> 转化。\n\n## 6月20日：战略定位、品牌升级、内容方法\n- Charlie：Nervos文章的打穿逻辑值得参考：戏剧化冲突、资历背书、灵魂拷问、使命宣告。\n- 侯明真：借鉴梁宁《愧疚感和罪恶感》的暗面坦诚，新增言书\"坎\"那一章。\n- Charlie：0代码这个点我觉得有点浅；很多女企业家用COCO也不是用来做产品写代码，而是AI power之后，高agency、高自主性、高能动性的"},

  {id:"signal-2026-05-22",title:"周度信号卡：2026年5月22日",kind:"周度信号卡",date:"2026-05-22",asset:"assets/sources/signal-2026-05-22.md",excerpt:"# 周度信号卡 — COCO\n\n客户代号：COCO\n会议日期：2026年5月22日\n会议时长：约1小时（00:01—01:01）\n分析日期：2026年5月31日\n会议性质：周度客户会议（KA案例复盘 + 三线社媒分发过盘 + GEO/SEO进展）\n\n## 核心议题\nICP客户画像收缩与案例视频内容工作流搭建（KA复盘叠加社媒三线分发过盘）。\n\n## 情感锚点\n\n### 1. ICP画像收缩、砍掉纯小C客户\n- 高温信号：填充词密度骤升，一口气长段陈述，\"不是我们用户\"\"不做了\"类判断重复多次。\n- 原话引用：Charlie 00:10:09 \"现在就是可有个基础的结论就是纯，就是买个几十美金，觉得我们99美金一个月还贵的那种小 c 就大概率不是我们的客户了。纯小 C 的可能就不做了，也没空伺候那些人之前搞了一堆试用的，到后来也就没续费。就是那帮人，不是我们用户。\"\n- 时间标记：00:10\n\n### 2. 单一渠道效应 vs 自办活动\n- 高温信号：重复\"没有任何卵用\"\"没有任何意义\"，语气强烈，连续否定过去的自办活动投入。\n- 原话引用：Charlie 00:11:30 \"我把这一个渠道管好了，就指别的各种各样别的事了，我辛辛苦苦做半天活动，没有任何卵用。这个从客户销售层面现在直接是一个很现实的状态，就是后面 JC 卡的那种有的没的活动 meta error 活动我都不去了，没有任何意义。\"\n- 时间标记：00:11\n\n### 3. Hack media 及其 LinkedIn ads 方案\n- 高温信号：反复贬低，\"挺水的\"\"扯淡\"\"虚\"\"就那么回事\"等词密集出现。\n- 原话引用：Charlie 00:16:27 \"克 media 我聊了，我觉得挺水的。那女的可能不懂，给我发了一个方案，我都不想给你发，就很扯淡，我觉得。\"\n- 时间标记：00:16—00:22\n\n## 新出现的人名/公司/事件\n- 杜蕾斯：大中华区总部正式官方合作。Charlie 00:09:44 \"对我们跟杜蕾斯已经正式合作了官方合作了。\"\n- 追觅：一个BU在用。Charlie 00:15:37 \"追觅的一个 BU 在用了。\"\n- Hack media / 艾瑞克：美国agency及老板，需与真正用AI产品的人沟通。\n- the nine bit / 第九城市：新加坡游戏子公司，单独案例。\n- GGoptima / 绩优：候选国内GEO供应商。\n- Salesforce 与 Slack 大会：Charlie参加后受到冲击。\n\n## 反复回归的人名/事件\n- Hack media / LinkedIn ads：持续走低。\n- 之外文化：持续升温，是最大客户和渠道案例之一。\n- 视频：出现5次以上，成为案例对外转化抓手。\n- workspace / 产品上线：保持平稳。\n\n## 关键原话摘录\n1. Charlie 00:10:09 \"纯小 C 的可能就不做了...就是那帮人，不是我们用户。\"\n2. Charlie 00:11:30 \"我辛辛苦苦做半天活动，没有任何卵用。\"\n3. Charlie 00:15:56 \"真正有进展的还是在亚洲在东边。\"\n4. Charlie 00:21:57 \"agency 就白白人那个圈子混的比较厉害...业务水平就那么回事。\"\n5. Charlie 00:37:16 \"我想把中国的 GEO 最牛逼的都聊一遍。\"\n\n## 回避/未完成的话题\n- 案例语料交付：Will多次索要语料，Charlie以\"找找\"\"你们找找看找不到我再找\"回应。\n- 案例对外工作流SOP：承认流程缺失，但未承诺时间。\n- 视频产品进度：推到内部日会。"},

  {id:"signal-2026-06-05",title:"周度信号卡：2026年6月5日",kind:"周度信号卡",date:"2026-06-05",asset:"assets/sources/signal-2026-06-05.md",excerpt:"# 周度信号卡 — COCO\n\n客户代号：COCO\n会议日期：2026年6月5日\n会议时长：约1小时10分钟\n分析日期：2026年6月9日\n会议性质：周度例会（新市场负责人 Alex 首次参会）\n\n## 核心议题\n视频内容生产卡点与网红/KOL 渠道的取舍排序。\n\n## 情感锚点\n\n### 1. Will 找来的 MCN agency（1万美金）\n- 高温信号：从汇报节奏突然切换到直白吐槽，连用\"贼丑\"\"贼恶心\"，重复\"没好好做\"\"一直卡着\"。\n- 原话引用：Charlie Hu 01:03:53 \"就是我们 will 找过来那个 agency，我就直话直说...我觉得他们第一波给我的视频贼丑，然后贼恶心，根本就没有符合我期望值...\"\n- 原话引用：Charlie Hu 01:04:25 \"他反正就一直逼我说拍50个视频，那我就第一波都没有让我满意，然后50个视频让我付钱...\"\n- 时间标记：01:03:53 – 01:05:09\n\n### 2. 私下拉会的\"文化\"\n- 高温信号：会议收尾时突然插入价值观表态，对新同事 Alex 喊话。\n- 原话引用：Charlie Hu 01:03:22 \"我要什么顾问我不喜欢那种私下你们拉会，然后搞得跟啥似的，我不喜欢这种文化。你有意见直接说...\"\n- 时间标记：01:03:22\n\n### 3. lollipopstar\n- 高温信号：先兴奋后否定，重复 scamy、\"有病吗\"，用背景信息论证不合作。\n- 原话引用：Charlie Hu 00:07:45 \"后来美国人的圈子里一问这个人口碑不太好，然后跟他合作的人都被他割了，有点 hustler scamming 的这种感觉。\"\n- 时间标记：00:07:45；01:06:59 – 01:07:56\n\n## 新出现的人名/公司/事件\n- 王荣鉴（Alex）：COCO 新市场负责人，本次首次参会。\n- lollipopstar / 艾瑞卡（Erica）：LA网红机构及其女老板，被否决。\n- 点马跳（dan）：投资人KOL，符合年龄定位的高质量参考对象。\n\n## 反复回归的人名/事件\n- Tiger：从\"形态不对\"到\"非常牛逼\"，情感升温。\n- Demo case 素材卡点：Will反复强调卡点，Charlie淡化。\n- MCN agency / 网红渠道成本：从开头否决到结尾集中爆发。\n\n## 关键原话摘录\n1. Charlie Hu 01:03:22 \"我不喜欢那种私下你们拉会...\"\n2. Charlie Hu 01:08:32 \"manus 抄 manus 就对了...\"\n3. Charlie Hu 00:51:41 \"大家都知道我卷王嘛...\"\n4. 王荣鉴 01:05:09 \"我希望自己就是有一个规划性的一个东西出来。\"\n5. Charlie Hu 01:04:25 \"我宁可慢慢白活着跟 tiger 去磨。\"\n\n## 回避/未完成的话题\n- Demo case素材产能：被淡化为\"不是绝对卡点\"。\n- MCN agency是否继续/付款：一直卡着，不做决定。\n- 白号测试数量与周期规划：Alex追问后仍未明确。"},
  {id:"signal-2026-06-11",title:"周度信号卡：2026年6月11日",kind:"周度信号卡",date:"2026-06-11",asset:"assets/sources/signal-2026-06-11.md",excerpt:"# 周度信号卡 — COCO\n\n客户代号：COCO\n会议日期：2026年6月11日\n会议时长：约28分钟（转录区间 00:03:55–00:32:16）\n分析日期：2026年6月15日\n会议性质：周度例会（SuperAI/谷歌云活动复盘 + 软文与演讲内容定位讨论）\n\n## 核心议题\n复盘谷歌云/SuperAI活动，探讨活动后软文与对外演讲的内容定位策略。\n\n## 情感锚点\n\n### 1. 湾区互刷ARR与Anthropic算力折扣套利\n- 高温信号：Charlie主动跑题开启\"阿尔法\"话题，跨多轮追问确认湾区是否普遍这么做。\n- 原话引用：Charlie Hu 00:10:31 \"我说点阿尔法吧...硅谷有很多项目在互相刷 arr。\"\n- 原话引用：Charlie Hu 00:10:49 \"就是为了融资，你你做服务公司，我做 agent 公司，我买你100 K 的服务，你买我100 K 价值的那个 agent。\"\n- 时间标记：00:10:31–00:15:48\n\n### 2. 自身在中美AI博弈中的\"棋子\"定位\n- 高温信号：\"棋子\"一词反复出现，连续反问，价值判断密集。\n- 原话引用：Charlie Hu 00:17:34 \"你是能上牌桌的棋子吗？你上不了牌桌，你不是 relevant 的，那你就没有任何意义...你有利用价值，哪怕是只是利用价值。那也是价值。\"\n- 时间标记：00:16:22–00:18:19\n\n### 3. 对SuperAI参展公司的\"乌合之众\"判断\n- 高温信号：明知会得罪人仍坚持表达，措辞带攻击性。\n- 原话引用：Charlie Hu 00:22:04 \"Super AI 的很多小展台里的 AI 公司6个月之后会死一大片...我的感受就全是一帮乌合之众。\"\n- 时间标记：00:22:04–00:22:45\n\n## 新出现的人名/公司/事件\n- feel safe（Felsafe）：Anthropic早期投资人，有算力折扣资源。\n- fable five：Anthropic新模型，价格很贵。\n- rambo：追加Anthropic老股的人。\n- epic：新加坡孵化器。\n- mistro（疑似 Mistral）：参会法国大模型厂商。\n- plod（疑似 Plaud）：录音笔硬件案例。\n- 哈发瑞：新加坡上市公司客户，两次会议搞定并付费。\n\n## 反复回归的人名/事件\n- 谷歌云/Google活动：从复盘走向软文换转发策略。\n- SuperAI/新加坡AI生态：从中性到贬抑，再被拉回预测。\n- 算力/token经济：从套利讨论到行业趋势。\n\n## 关键原话摘录\n1. Charlie Hu 00:17:34 \"你是能上牌桌的棋子吗？\"\n2. Charlie Hu 00:22:04 \"全是一帮乌合之众。\"\n3. Charlie Hu 00:10:14 \"只能说找反共识的东西。\"\n4. Charlie Hu 00:21:53 \"否则的话扯犊子。\"\n5. Charlie Hu 00:29:20 \"新加坡创业，又有中国资源...也有美国客户。\"\n\n## 回避/未完成的话题\n- 是否做互刷ARR/算力套利：推迟到未来。\n- Anthropic老股/WhatsApp群：突然结束并玩笑带过。\n- SEO/网址未被索引：甩给Evan，定性为执行细节。"},
  {id:"whiteboard-logic",title:"COCO周五白板生成逻辑",kind:"白板逻辑",date:"2026-06-21",asset:"assets/sources/whiteboard-current-logic.md",excerpt:"# COCO 周五白板生成逻辑\n\n## 正确时间顺序\n1. 每周五开会前，先持续更新白板。\n2. 周五会议直接使用白板过进展、问题、数据、材料和下一步。\n3. 会议文本是会后的记录，不能反向混进当周会前白板。\n4. 会后根据会议文本、群聊、每日产出与数据，生成下一周周五白板。\n\n## 白板应有结构\n1. 会议日程总览：单列呈现，本周要过什么。\n2. 上周重点回顾：只保留最重要的结果和变化。\n3. 客户最近新提出或集中讨论的问题：按问题列出。\n4. 我方处理方式/解决方案：对应到负责人、材料、数据或排期。\n5. 明细区：视频、SEO、数据、社媒、素材库、交付节点。\n6. 证据区：每个判断关联群聊日期、会议文本或素材文件。\n\n## 设计原则\n- 前面看重点，后面看明细。\n- 客户展示页少废话，避免心路历程。\n- 所有数据、判断、客户心理变化都要可追溯。"},

DB.videoImportedGantt=(function(){
  const months=[{m:"5月",w:2,labels:["W4","W5"]},{m:"6月",w:5,labels:["W1","W2","W3","W4","W5"]}];
  const idx=d=>{
    d=String(d||"");
    if(/05-(2[0-5])/.test(d))return 0;
    if(/05-(2[6-9]|30|31)|06-01/.test(d))return 1;
    if(/06-0[2-8]/.test(d))return 2;
    if(/06-(09|1[0-5])/.test(d))return 3;
    if(/06-(1[6-9]|2[0-2])/.test(d))return 4;
    if(/06-(2[3-9])/.test(d))return 5;
    return 6;
  };
  const state=s=>/完成/.test(s)?"done":/剪辑中|进行中/.test(s)?"doing":/未开始/.test(s)?"plan":"blocked";
  const task=v=>{
    const start=idx(v.start||v.due||v.end);
    const end=idx(v.end||v.due||v.start);
    return {name:v.title,pri:v.pri||"",start,span:Math.max(1,Math.min(3,end-start+1)),state:state(v.status),meta:v.status||""};
  };
  const groups=[
    {name:"Demo / 产品介绍",note:"3条",match:v=>/功能展示|产品介绍/.test(v.cat||"")},
    {name:"客户案例 / Use Case",note:"12条",match:v=>/案例展示|白人使用感受/.test(v.cat||"")},
    {name:"基础视频 / 活动",note:"5条",match:v=>/基础视频/.test(v.cat||"")},
    {name:"品牌 / 安全补充素材",note:"2条",match:v=>/创始团队|安全与隐私/.test(v.cat||"")}
  ];
  return {months,today:5,phases:groups.map(g=>({name:g.name,note:g.note,tasks:(DB.videoScheduleNotion||[]).filter(g.match).map(task)}))};
})();

 function cardText(c){return [c.topic,c.summary].concat(c.items||[],(c.details||[]).flatMap(d=>d.items||[])).join(" ")}
 function pick(text,patterns,limit){
  const parts=String(text||"").split(/[。；;\n]/).map(s=>s.trim()).filter(Boolean);
  return parts.filter(s=>patterns.some(p=>p.test(s))).slice(0,limit);
 }
 function inferredProgressGantt(c,type){
  const text=cardText(c);
  const done=pick(text,[/已完成|已发|已上线|已发布|交付|发布|产出|写了|提供/],2);
  const doing=pick(text,[/进行中|录制剪辑中|剪辑中|待发|本周|正在|持续|整理中|优化/],2);
  const plan=pick(text,[/下一步|后续|计划|预计|待.*交付|陆续|准备|需要/],2);
  const blocked=pick(text,[/待.*配合|待.*反馈|未授权|待补|需要.*提供|卡点|问题/],2);
  const mk=(name,items,state,start)=>({name,note:type,tasks:(items.length?items:[name]).map((x,i)=>({name:x.slice(0,80),pri:i?"P1":"P0",start:start+i,span:1,state,meta:state==="blocked"?"待配合":state==="done"?"已完成":state==="doing"?"进行中":"下一步"}))});

 }
 originalWeeks.forEach(function(w){

   const topic=String(c.topic||"");
   const wants=progressRe.test(topic);
   if(!wants)return;
   const type=seoRe.test(topic)?"SEO":(videoRe.test(topic)?"视频":"进度");
   const old=oldCards.find(function(oc){
    if(!oc.gantt)return false;
    const ot=String(oc.topic||oc.title||"");
    return (type==="SEO"&&seoRe.test(ot))||(type==="视频"&&videoRe.test(ot));
   });
   c.gantt=old&&old.gantt?old.gantt:inferredProgressGantt(c,type);
  });

  const next=Object.assign({},prev,w,{title:prev.title||w.title,stub:false});

function cleanNotionText(s){return String(s||"").replace(/\r/g,"").replace(/\u00a0/g," ").trim()}
function normalizeMeetingDate(d){return cleanNotionText(d).replace(/\//g,"-")}
function splitNotionBlocks(text,fallback="段落"){
 const src=cleanNotionText(text).replace(/^会议总结\s*/,"").trim();
 if(!src)return [];
 const re=/(^|\n)\s*((?:【)?(?:任务)?\d+[、.：:）)]\s*[^\n]*(?:】)?)/g;
 const ms=[];let m;
 while((m=re.exec(src)))ms.push({idx:m.index+(m[1]||"").length,head:cleanNotionText(m[2])});
 if(ms.length){
  return ms.map((x,i)=>{
   const bodyStart=x.idx+x.head.length;
   const end=i<ms.length-1?ms[i+1].idx:src.length;
   const title=x.head.replace(/^【/,"").replace(/】$/,"").replace(/\s+/g," ");
   return {title:title||`${fallback}${i+1}`,body:cleanNotionText(src.slice(bodyStart,end))};
  }).filter(b=>b.title||b.body);
 }
 return src.split(/\n{2,}/).map(x=>cleanNotionText(x)).filter(Boolean).map((body,i)=>({title:`${fallback}${i+1}`,body}));
}
function parseCsvRows(text){
 const rows=[];let row=[],cell="",q=false;
 for(let i=0;i<String(text||"").length;i++){
  const ch=text[i],n=text[i+1];
  if(q&&ch==='"'&&n==='"'){cell+='"';i++;continue}
  if(ch==='"'){q=!q;continue}
  if(!q&&ch===","){row.push(cell);cell="";continue}
  if(!q&&(ch==="\n"||ch==="\r")){
   if(ch==="\r"&&n==="\n")i++;
   row.push(cell);cell="";
   if(row.some(v=>String(v).trim()!==""))rows.push(row);
   row=[];continue
  }
  cell+=ch;
 }
 row.push(cell);if(row.some(v=>String(v).trim()!==""))rows.push(row);
 const head=rows.shift()||[];
 return rows.map(r=>Object.fromEntries(head.map((h,i)=>[cleanNotionText(h),r[i]||""])));
}
function taskSideBlocks(taskText,willText){
 const allTask=cleanNotionText(taskText), willRaw=cleanNotionText(willText);
 const willHead=/(^|\n)\s*(?:郎瀚威团队待做|郎瀚威团队待办|Will\s*团队(?:本周)?任务|Will\s*团队待做|郎已布置任务)[:：]?/i;
 const cocoHead=/(^|\n)\s*(?:COCO\s*团队待做|COCO\s*团队待办|Coco\s*团队(?:本周)?任务|客户(?:团队)?待做|对方(?:团队)?待做)[:：]?/i;
 const findPart=(labelRe,nextRe)=>{
  const m=labelRe.exec(allTask);
  if(!m)return "";
  const start=m.index+(m[1]==="\n"?1:0);
  const rest=allTask.slice(start);
  const tail=rest.slice(m[0].length);
  const n=tail.search(nextRe);
  return n>=0?rest.slice(0,m[0].length+n):rest;
 };
 let will=splitNotionBlocks(willRaw||findPart(willHead,cocoHead),"我方待办");
 let coco=splitNotionBlocks(findPart(cocoHead,willHead),"COCO待办");
 const all=splitNotionBlocks(allTask,"待办");
 if(!will.length&&all.length)will=all.filter(b=>/Will|郎瀚威|will团队/i.test(b.title+b.body));
 if(!coco.length&&all.length)coco=all.filter(b=>/COCO|Coco|Charlie|Kevin|Owen|Alex|Eric|Evan|客户|对方/i.test(b.title+b.body));
 if(!will.length&&!coco.length&&all.length)coco=all;
 return {will,coco,all};
}

 const sources=["notion-meetings-export-20260626-all-csv"];

function renderCardTable(t){
  if(!t||!Array.isArray(t.cols)||!Array.isArray(t.rows)) return "";
  const cellHtml=(cell,col)=>{
    const text=String(cell??"").trim();
    if(/^https?:\/\/\S+$/i.test(text)){
      const label=/x\.com|twitter\.com/i.test(text)?"打开原帖 ↗":(/链接|url|原帖/i.test(String(col||""))?"打开链接 ↗":text);
      return `<a class="linkchip" href="${esc(text)}" target="_blank">${esc(label)}</a>`;
    }
    return esc(cell);
  };
  return `<div class="smatrix cfg"><table><thead><tr>${t.cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${t.rows.map(r=>`<tr>${r.map((cell,i)=>`<td class="${i===0?"pl":""}">${cellHtml(cell,t.cols[i])}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
}
function isPdfUrl(u){return /\.pdf(?:$|[?#])/i.test(String(u||""))}
function fileIcon(url,type){
  const t=String(type||url||"").toLowerCase();
  return isPdfUrl(url)||t.includes("pdf")?`<span class="pdf-badge">PDF</span>`:"";
}
function openFileLabel(url,type){
  const t=String(type||url||"").toLowerCase();
  if(isPdfUrl(url)||t.includes("pdf"))return "打开 PDF";
  if(t.includes("ppt"))return "打开 PPT";
  if(t.includes("video")||/\.(mp4|mov|webm)(?:$|[?#])/i.test(String(url||"")))return "打开视频";
  return "打开原文";
}
function renderCardLinks(links=[]){
  const seen=new Set();
  return links.filter(Boolean).filter(l=>{
    const url=typeof l==="string"?l:l.url;
    if(!url)return true;
    const key=normalizeAssetUrl(url);
    if(seen.has(key))return false;
    seen.add(key);
    return true;
  }).map(l=>{
    const url=typeof l==="string"?l:l.url;
    const label=typeof l==="string"?l:(l.label||l.title||l.name||l.url||"打开链接");
    const pdf=isPdfUrl(url)||/pdf/i.test(label);
    return url?`<a class="source-pill ${pdf?"pdf-link":""}" href="${esc(url)}" target="_blank">${fileIcon(url,label)}<span>${esc(label)}</span></a>`:"";
  }).join("");
}
function normalizeAssetUrl(url){
  return String(url||"").split("#")[0].split("?")[0].replace(/\\/g,"/").trim();
}
function renderMediaWall(media=[]){
  media=(Array.isArray(media)?media:[]).filter(Boolean);
  if(!media.length) return "";
  return `<div class="media-wall">${media.map(m=>{
    const src=m.src||m.url||"";
    const label=m.label||m.title||m.type||"素材";
    const type=m.type||((src||"").split(".").pop()||"文件");
    const isImage=!!m.src;
    const isPdf=isPdfUrl(src)||String(type).toLowerCase().includes("pdf");
    const detail=m.detail||m.note||"点击“打开原文件”可查看完整文件；预览区已按完整比例缩放，不裁切截图内容。";
    return `<article class="media-card"><div class="media-frame">${isImage?`<img src="${esc(src)}" alt="${esc(label)}">`:`<div class="media-doc ${isPdf?"pdf-doc":""}">${fileIcon(src,type)}<span>${esc(isPdf?"PDF":String(type).toUpperCase())}</span></div>`}</div><div class="media-cap">${esc(label)}</div><div class="media-sub">${esc(type)} · 完整比例缩放预览</div><details class="media-detail"><summary>查看详情</summary><div>${esc(detail)}</div></details><div class="source-actions" style="padding:0 11px 11px;margin-top:auto"><a class="source-pill ${isPdf?"pdf-link":""}" href="${esc(src)}" target="_blank">${fileIcon(src,type)}<span>${esc(openFileLabel(src,type))}</span></a></div></article>`;
  }).join("")}</div>`;
}

function renderCardGantt(g){
  if(!g||!Array.isArray(g.months)||!Array.isArray(g.phases)) return "";
  const months=g.months;
  const total=months.reduce((sum,m)=>sum+(Number(m.w)||0),0)||1;
  const minWidth=210+total*54;
  const headerCols=`210px repeat(${total}, minmax(54px,1fr))`;
  const labels=months.flatMap(m=>Array.isArray(m.labels)&&m.labels.length?m.labels:Array.from({length:Number(m.w)||1},(_,i)=>`W${i+1}`));
  const today=Number(g.today);
  const todayLine=Number.isFinite(today)?`<div class="todayline" style="left:${Math.max(0,Math.min(100,(today/total)*100))}%"></div>`:"";
  const currentRow=Number.isFinite(today)?`<div class="g-current gridrow" style="grid-template-columns:${headerCols};min-width:${minWidth}px"><div class="lab">当前</div>${labels.map((l,i)=>`<div class="g-now ${i===Math.max(0,Math.min(total-1,Math.round(today)))?"on":""}">${i===Math.max(0,Math.min(total-1,Math.round(today)))?"当前":""}</div>`).join("")}</div>`:"";
  const phaseHtml=g.phases.map(p=>{
    const tasks=Array.isArray(p.tasks)?p.tasks:[];
    const taskHtml=tasks.map(t=>{
      const start=Math.max(0,Number(t.start)||0);
      const span=Math.max(.5,Number(t.span)||1);
      const left=Math.max(0,Math.min(100,(start/total)*100));
      const width=Math.max(4,Math.min(100-left,(span/total)*100));
      const state=["done","doing","plan","blocked"].includes(t.state)?t.state:"plan";
      return `<div class="g-task" style="grid-template-columns:210px minmax(${total*54}px,1fr);min-width:${minWidth}px"><div class="lab"><span class="ptag ${esc(t.pri||"")}">${esc(t.pri||"")}</span>${esc(t.name||"任务")}<span class="meta">${esc(t.meta||"")}</span></div><div class="track" style="--c:${total}">${todayLine}<div class="bar ${state}" style="left:${left}%;width:${width}%">${esc(t.meta||t.name||"")}</div></div></div>`;
    }).join("");
    return `<div class="g-phase gridrow" style="grid-template-columns:${headerCols};min-width:${minWidth}px"><div class="pl">${esc(p.name||"阶段")}${p.note?`<span class="pnote">${esc(p.note)}</span>`:""}</div></div>${taskHtml}`;
  }).join("");
  return `<div class="glegend"><span><i style="background:#2E7D5B"></i>已完成</span><span><i style="background:#D85C32"></i>进行中</span><span><i style="background:#3E6EA8"></i>计划中</span><span><i style="background:#B5432E"></i>卡点</span></div><div class="gantt"><div class="gridrow" style="grid-template-columns:${headerCols};min-width:${minWidth}px"><div class="lab"></div>${months.map(m=>`<div class="g-month" style="grid-column:span ${Number(m.w)||1}">${esc(m.m||"")}</div>`).join("")}</div><div class="gridrow" style="grid-template-columns:${headerCols};min-width:${minWidth}px"><div class="lab"></div>${labels.map(l=>`<div class="g-wk">${esc(l)}</div>`).join("")}</div>${currentRow}${phaseHtml}</div>`;
}

function wcard(c){
  c=c||{};
  const asList=v=>Array.isArray(v)?v:(v===undefined||v===null||v===""?[]:[v]);
  const first=(...vals)=>vals.find(v=>v!==undefined&&v!==null&&v!==""&&(!Array.isArray(v)||v.length))||"";
  const title=first(c.title,c.topic,c.name,c.label,"事项");
  const owner=first(c.owner,c.lead,c.responsible,c.team,c.role);
  const status=first(c.status,c.stage,c.tag,c.state);
  const summary=first(c.summary,c.desc,c.description,c.text,c.conclusion,c.note);
  const rawLinks=asList(c.links);
  const linkAssets=new Set(rawLinks.map(l=>typeof l==="string"?l:l&&l.url).filter(Boolean).map(normalizeAssetUrl));
  const sources=asList(first(c.sources,c.sourceIds,c.evidenceIds,c.evidence,[])).filter(Boolean).filter(id=>{
    const s=sourceById(id);
    return !s||!s.asset||!linkAssets.has(normalizeAssetUrl(s.asset));
  });
  const itemText=v=>{
    if(v===undefined||v===null) return "";
    if(typeof v==="string"||typeof v==="number") return esc(v);
    const k=first(v.k,v.key,v.time,v.date,v.label);
    const val=first(v.v,v.value,v.text,v.note,v.title,v.name,v.desc);
    return `${k?`<span class="mini">${esc(k)}</span> `:""}${esc(val)}`;
  };
  const block=(label,items)=>{
    items=asList(items).filter(Boolean);
    if(!items.length) return "";
    return `<div class="wblock"><div class="wlabel">${esc(label)}</div><ul>${items.map(x=>`<li>${itemText(x)}</li>`).join("")}</ul></div>`;
  };
  const metrics=asList(c.metrics).filter(Boolean).map(m=>{
    if(typeof m==="string") return `<span class="tag">${esc(m)}</span>`;
    const name=first(m.name,m.label,m.k);
    const value=first(m.value,m.v,m.cur,m.text);
    return `<span class="tag">${esc(name)}${value?`：${esc(value)}`:""}</span>`;
  }).join("");
  const links=renderCardLinks(rawLinks);
  return `<section class="wcard">
    <div class="wcard-h"><div class="ct">${esc(title)}</div><div class="co">${owner?`<b>${esc(owner)}</b>`:""}${status?` · ${esc(status)}`:""}</div></div>
    ${summary?`<p>${esc(summary)}</p>`:""}
    ${metrics?`<div class="source-actions">${metrics}</div>`:""}
    ${block("关键结论",first(c.points,c.highlights,c.insights,c.findings,[]))}
    ${renderCardGantt(c.gantt)}
    ${c.table?renderCardTable(c.table):""}
    ${renderMediaWall(c.media)}
    ${block("本周动作 / 进展",first(c.items,c.actions,c.outputs,c.progress,c.deliveries,[]))}
    ${block("问题与解决方式",first(c.solutions,c.issues,c.todo,c.todos,c.nexts,[]))}
    ${c.detailsOpen?renderCardDetailsOpen(c.detailTitle,c.details):renderCardDetails(c.detailTitle,c.details)}
    ${renderWorkSections(c.workSections)}
    ${links?`<div class="source-actions">${links}</div>`:""}
    ${sources.length?sourceActions(sources):""}
  </section>`;
}

function socialValue(v,suffix,metric){
 if(v===null||v===undefined||v==="")return "-";
 if(String(v)==="-")return "-";
 const n=Number(v);
 if(Number.isFinite(n)&&/率|完成率|完播率/i.test(String(metric||""))&&Math.abs(n)<=1)return (n*100).toFixed(1).replace(/\.0$/,"")+"%";
 return Number.isFinite(n)?n.toLocaleString()+esc(suffix||""):esc(v)+esc(suffix||"");
}
function socialDelta(now,prev){
 if(now===null||prev===null||now===undefined||prev===undefined||prev===""||String(now)==="-"||String(prev)==="-")return {text:"-",cls:"flat"};
 const n=Number(now),p=Number(prev);
 if(!Number.isFinite(n)||!Number.isFinite(p)||!p)return {text:n===p?"0":"新增",cls:n>=p?"up":"down"};
 const d=(n-p)/p*100;
 return {text:(d>0?"+":"")+d.toFixed(Math.abs(d)>=10?0:1)+"%",cls:d>0?"up":(d<0?"down":"flat")};
}
function socialMetricValue(metric,idx){return (metric.values||[])[idx]&&(metric.values||[])[idx].value}
function socialAccountTone(account){const s=String(account||"");if(/视频号|公众号|小红书/.test(s))return "green";if(/LinkedIn|Linkedin|YouTube/.test(s))return "blue";return "yellow"}
function socialMatrixHasBar(account,metric){
 const a=String(account||"").toLowerCase(),m=String(metric||"");
 const pairs=[
  [/^x个人号 charlie$/i,"浏览量"],
  [/^linkedin企业号 coco$/i,"点赞"],
  [/^youtube 官方号$/i,"浏览量"],
  [/^linkedin个人号 charlie 没有授权$/i,"点赞"],
  [/^x企业号 coco$/i,"浏览量"],
  [/^charlie视频号$/i,"播放量"],
  [/^公众号 官方号$/i,"阅读量"],
  [/^小红书 官方$/i,"浏览量"]
 ];

}
function socialBar(now,prev){
 const n=Number(now)||0,p=Number(prev)||0,max=Math.max(n,p,1);

function isPortraitVideo(v){return /竖屏|vertical/i.test([v.type,v.title,v.asset].join(" "));}
const VIDEO_PLATFORMS=[
  {key:"x",label:"X",aliases:["x","twitter","推特"]},
  {key:"youtube",label:"YouTube",aliases:["youtube","yt","油管"]},
  {key:"wechatVideo",label:"视频号",aliases:["视频号","wechat","channels","微信视频号"]},
  {key:"xiaohongshu",label:"小红书",aliases:["小红书","xhs","rednote"]}
];
function videoPublishMap(v){
  const out={};
  const put=(name,url)=>{
    if(!name)return;
    const raw=String(name).trim().toLowerCase();
    const hit=VIDEO_PLATFORMS.find(p=>p.key.toLowerCase()===raw||p.aliases.some(a=>raw.includes(String(a).toLowerCase())));
    if(hit)out[hit.key]=String(url||"").trim();
  };
  const src=v.publishLinks||v.publishedLinks||v.publish||v.published||v.platformLinks||v.pubLinks||null;
  if(src&&Array.isArray(src))src.forEach(x=>put(x.platform||x.plat||x.name||x.key,x.url||x.href||x.link||x.pub||""));
  else if(src&&typeof src==="object")Object.entries(src).forEach(([k,u])=>put(k,u));
  if(v.platform||v.pub)put(v.platform||v.plat,v.pub||v.url||"");
  return out;
}
function videoLanguage(v){
  const text=[v.title,v.type,v.group].join(" ").toLowerCase();
  if(/english|英文|en\b/.test(text))return "en";
  if(/中文|中文版|chinese|zh\b/.test(text))return "zh";
  return "unknown";
}
function videoPublishPlatforms(v,links){
  const lang=videoLanguage(v);
  const byKey=key=>VIDEO_PLATFORMS.find(p=>p.key===key);
  if(lang==="en")return ["x","youtube"].map(byKey).filter(Boolean);
  if(lang==="zh")return ["wechatVideo","xiaohongshu","youtube"].map(byKey).filter(p=>p&&(["wechatVideo","xiaohongshu"].includes(p.key)||links[p.key]));
  return VIDEO_PLATFORMS.filter(p=>links[p.key]).concat(VIDEO_PLATFORMS.filter(p=>!links[p.key]&&["wechatVideo","xiaohongshu"].includes(p.key)));
}
function videoPublishChips(v){
  const links=videoPublishMap(v);
  const platforms=videoPublishPlatforms(v,links);
  const published=/已发布|已发/.test(String(v.status||""));
  return `<div class="platform-grid">${platforms.map(p=>{const url=links[p.key]||"";const status=url?"已发布":(published?"待补链接":"待发布");const inner=`<span class="platform-logo ${p.key}"></span><span class="platform-text"><b>${esc(p.label)}</b><span>${esc(status)}</span></span>`;return url?`<a class="platform-chip live" href="${esc(url)}" target="_blank">${inner}</a>`:`<span class="platform-chip missing">${inner}</span>`}).join("")}</div>`;

function todayISO(){var d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)}
function submissionDateFromText(text){
 var s=String(text||"");
 var full=s.match(/(20\d{2})[\/.\-年](\d{1,2})[\/.\-月](\d{1,2})/);
 if(full)return full[1]+"-"+String(full[2]).padStart(2,"0")+"-"+String(full[3]).padStart(2,"0");
 var md=s.match(/(?:^|\D)(\d{1,2})[\/.\-](\d{1,2})(?:\D|$)/);
 if(md)return (new Date().getFullYear())+"-"+String(md[1]).padStart(2,"0")+"-"+String(md[2]).padStart(2,"0");
 return todayISO();
}
function submissionGuess(text){
 var raw=String(text||"").trim(),low=raw.toLowerCase(),type="客户文件";
 if(/seo|gsc|关键词|收录|页面|canonical|404|notion|工具页|官网/.test(low))type="SEO页面";
 else if(/深度报告|报告|分析|复盘|周报|调研|研究|竞品|竞对|数据报告|数据深度/.test(raw))type="深度报告";
 else if(/视频|demo|use case|剪辑|录制|字幕|竖屏|横屏|口播|素材/.test(raw))type="视频";
 else if(/截图|图片|看板|飞书|dashboard/.test(low))type="图片截图";
 else if(/社媒|小红书|linkedin|twitter|推文|帖子|公众号|微博|朋友圈|发布/.test(low))type="社媒发布";
 else if(/方案|白板|会议|周会|待办|计划|风险/.test(raw))type="方案文档";
 var owners=["侯明真","周星星","李阳阳","李家乐","吕教东","孔德浩","孔维彤","代逸如"];
 var found="";for(var i=0;i<owners.length;i++){if(raw.indexOf(owners[i])>=0){found=owners[i];break;}}
 var url=(raw.match(/https?:\/\/\S+/)||[""])[0];
 return {type:type,owner:found?(found==="代逸如"?"代逸如（帮忙）":found):"侯明真",date:submissionDateFromText(raw),url:url,note:raw};
}

 var entry={type:(document.getElementById("manualType")||{}).value||"",owner:(document.getElementById("manualOwner")||{}).value||"",date:(document.getElementById("manualDate")||{}).value||"",note:((document.getElementById("manualNote")||{}).value||"").trim(),url:((document.getElementById("manualUrl")||{}).value||"").trim(),files:files.map(function(f){return {name:f.name,size:f.size,type:f.type||""}}),savedAt:new Date().toLocaleString()};
 if(!entry.note){submitNotice("manualResult","一句话说明还没填。先写这条内容是什么，再提交。");return false;}
 var old=JSON.parse(localStorage.getItem("coco-submit-drafts")||"[]");old.unshift(entry);localStorage.setItem("coco-submit-drafts",JSON.stringify(old.slice(0,50)));
 submitNotice("manualResult","<b style='color:#b83a26'>已保存为本机草稿。</b><br>类型："+esc(entry.type)+"<br>负责人："+esc(entry.owner)+"<br>日期："+esc(entry.date)+"<br>文件："+(entry.files.length?esc(entry.files.map(function(f){return f.name}).join("、")):"未上传文件")+"<br><br>当前是静态站：会先记录所有文件名；真正入库时再把文件放进 assets 并更新素材库 / 证据索引。");
 return false;
}
var pendingSocialImage=null;
function setSocialPreview(src,name){
 pendingSocialImage=src?{src:src,name:name||"飞书社媒看板截图"}:null;
 var box=document.getElementById("socialShotPreview");if(!box)return;
 box.innerHTML=src?`<div class="social-preview"><img src="${src}" alt="${esc(name||"社媒看板截图")}"><div class="aihint">已读取：${esc(name||"截图")}，提交后会自动显示到数据中心。</div></div>`:"";
}
function readSocialImageFile(file){
 if(!file||!/^image\//.test(file.type||"")){submitNotice("socialDashResult","请选择或粘贴图片文件。");return;}
 var reader=new FileReader();
 reader.onload=function(){setSocialPreview(reader.result,file.name||"粘贴截图")};
 reader.readAsDataURL(file);
}
function previewSocialDashboardFile(input){
 var file=input&&input.files&&input.files[0];readSocialImageFile(file);return false;
}
function handleSocialDashboardPaste(e){
 var items=Array.prototype.slice.call(e.clipboardData&&e.clipboardData.items?e.clipboardData.items:[]);
 var imgItem=items.find(function(x){return /^image\//.test(x.type||"")});
 if(imgItem){e.preventDefault();readSocialImageFile(imgItem.getAsFile());return false;}
 var text=e.clipboardData&&e.clipboardData.getData("text/plain");
 if(text){var ta=document.getElementById("socialDashText");if(ta){ta.value=(ta.value?ta.value+"\n":"")+text;submitNotice("socialDashResult","已接收剪贴板里的表格文本；如果也有截图，可以继续粘贴或上传图片。");}}
 return false;
}
function saveSocialDashboardEntry(){
 var entry={date:(document.getElementById("socialDashDate")||{}).value||todayISO(),note:((document.getElementById("socialDashNote")||{}).value||"").trim()||"飞书社媒看板截图",url:((document.getElementById("socialDashUrl")||{}).value||"").trim(),rawText:((document.getElementById("socialDashText")||{}).value||"").trim(),src:pendingSocialImage&&pendingSocialImage.src||"",name:pendingSocialImage&&pendingSocialImage.name||"",savedAt:new Date().toLocaleString()};
 if(!entry.src&&!entry.rawText){submitNotice("socialDashResult","还没有截图或表格文本。请上传图片、粘贴截图，或粘贴飞书表格文本。");return false;}
 var old=localSocialEntries();old.unshift(entry);localStorage.setItem(SOCIAL_LOCAL_KEY,JSON.stringify(old.slice(0,20)));
 setSocialPreview("","");
 var input=document.getElementById("socialDashFile");if(input)input.value="";
 submitNotice("socialDashResult","<b style='color:#b83a26'>已更新到数据中心。</b><br>日期："+esc(entry.date)+"<br>说明："+esc(entry.note)+"<br><br>打开左侧“数据中心”即可看到最新截图。截图会先进入本机预览；如果要让所有人线上都看到，需要把截图文件入库到 assets 后再发布。");
 return false;
}
function submitView(){return topbar(`<b>COCO</b> · 每日信息录入`)+`<h2 class="pagetitle">每日信息录入</h2><div class="pagedesc">两种方式：①「随手记」一句话丢进去，AI 自动归类；② 上传文件/图片并补一句说明，后续归档进证据索引或白板素材。</div>
 <div class="quickbox"><div class="small" style="margin-bottom:6px">随手记（推荐）</div><textarea id="quickNote" placeholder="例：今天交付了 VC 文章抓取页，给 COCO 6 篇本周阅读列表 —— 或者直接粘一段群聊/会议片段"></textarea><div class="aihint">↳ AI 会判断这是交付 / 确认事项 / 数据点，自动归类填好，你确认即可。</div><div style="margin-top:10px"><button class="submitbtn" type="button" onclick="return prefillSubmission()">AI 归类并预填</button></div><div id="quickResult" class="submit-live-result" style="display:none;margin-top:10px;border:1px solid var(--line);background:#FBF9F4;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.55;color:var(--ink)"></div></div>
 <div class="form social-form"><div class="small" style="margin-bottom:10px">飞书社媒看板录入</div>
  <div class="row2"><div class="fr"><label>日期</label><input id="socialDashDate" value="${todayISO()}"></div><div class="fr"><label>来源链接（选填）</label><input id="socialDashUrl" value="${esc((DB.dataCenterUpdate||{}).feishu||"")}" placeholder="https://"></div></div>
  <div class="fr"><label>截图说明</label><input id="socialDashNote" placeholder="例：6/27 飞书近两周社媒数据截图"></div>
  <div class="uploadbox"><label>上传飞书截图</label><input id="socialDashFile" type="file" accept="image/*" onchange="previewSocialDashboardFile(this)"><div class="aihint">也可以点下面的粘贴框后直接 Ctrl+V 粘贴截图。</div></div>
  <div id="socialPasteZone" class="social-paste-zone" tabindex="0" onpaste="return handleSocialDashboardPaste(event)">点击这里后粘贴飞书社媒看板截图<br>如果从飞书复制的是表格文本，也会进入下面文本框。</div>
  <div id="socialShotPreview"></div>
  <div class="fr" style="margin-top:12px"><label>飞书表格文本（选填，复制单元格时可粘贴）</label><textarea id="socialDashText" placeholder="可选：从飞书复制表格区域后粘贴到这里，后续可用于结构化重绘。"></textarea></div>
  <button class="submitbtn" type="button" onclick="return saveSocialDashboardEntry()">更新到数据中心</button><div id="socialDashResult" class="submit-live-result" style="display:none;margin-top:10px;border:1px solid var(--line);background:#FBF9F4;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.55;color:var(--ink)"></div>
 </div>
 <div class="form"><div class="small" style="margin-bottom:10px">或手动登记一条交付 / 素材</div>
  <div class="fr"><label>类型</label><select id="manualType"><option>社媒发布</option><option>视频</option><option>SEO页面</option><option>深度报告</option><option>图片截图</option><option>客户文件</option><option>个人IP内容</option><option>活动支持</option><option>方案文档</option></select></div>
  <div class="row2"><div class="fr"><label>负责人（本客户核心，可展开选全员）</label><select id="manualOwner"><option>侯明真</option><option>周星星</option><option>李阳阳</option><option>李家乐</option><option>吕教东</option><option>孔德浩</option><option>孔维彤</option><option>代逸如（帮忙）</option></select></div><div class="fr"><label>日期</label><input id="manualDate" value="${todayISO()}"></div></div>
  <div class="uploadbox"><label>上传文件 / 图片</label><input id="manualFile" type="file" multiple="multiple" accept="image/*,video/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.csv,.txt,.md" onchange="showUploadNames(this)"><div id="uploadNames" class="uploadlist" style="white-space:pre-wrap">未选择文件</div><div class="aihint">支持批量上传：在选择文件窗口里按 Ctrl / Shift 多选。静态预览版会先记录所有文件名；真正发布时把文件放入 assets 后即可出现在素材库 / 证据索引。</div></div>
  <div class="fr"><label>一句话说明（必填）</label><input id="manualNote" placeholder="例：6/24 新增 SEO 模板截图，放入本周白板 SEO 卡片"></div>
  <div class="fr"><label>原帖 / 来源链接（选填）</label><input id="manualUrl" placeholder="https://"></div>
  <button class="submitbtn" type="button" onclick="return saveSubmissionDraft()">提交</button><div id="manualResult" class="submit-live-result" style="display:none;margin-top:10px;border:1px solid var(--line);background:#FBF9F4;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.55;color:var(--ink)"></div></div>`}

function rosterView(){const rows=DB.roster.members.map(m=>`<tr><td>${who(m.name)}</td><td>${esc(m.role)}</td><td class="small">${esc(m.group)}</td></tr>`).join("");const hp=DB.roster.helpers.map(h=>`<tr><td>${who(h.name)}</td><td><span class="tag fresh">帮忙</span></td><td class="small">${esc(h.note)}</td></tr>`).join("");return topbar(`<b>COCO</b> · 团队名单`)+`<h2 class="pagetitle">团队名单</h2><div class="pagedesc">本客户核心成员引用全公司全员名单（/team.yaml）。负责人 ${esc(DB.roster.lead)} · 把关 ${esc(DB.roster.reviewer)}。增删人改一处、全站联动。</div><table class="t"><thead><tr><th>成员</th><th>本客户角色</th><th>所属组</th></tr></thead><tbody>${rows}${hp}</tbody></table>`}
bootWithAuth();
</script>
</body>
</html>
