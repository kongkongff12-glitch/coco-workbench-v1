<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COCO 客户工作台 v1</title>
  <style>
    :root{
      --bg:#F6F3EC; --side:#F1EBE1; --panel:#FFFFFF; --ink:#211C15; --sub:#736A5C; --faint:#9D9384;
      --line:#E7DECF; --line-dark:#D2C6B5; --green:#2E5E4E; --green-bg:#EAF1ED;
      --amber:#9A6B1F; --amber-bg:#F6EEDC; --red:#B5432E; --red-bg:#F8E9E5;
      --blue:#3E5A7E; --blue-bg:#E8EEF5; --gray:#787168; --gray-bg:#EFEBE2;
      --serif:"Noto Serif SC","Songti SC",serif;
      --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.58}
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .app{display:flex;min-height:100vh}
    .side{position:sticky;top:0;width:248px;height:100vh;overflow:auto;flex-shrink:0;border-right:1px solid var(--line-dark);background:var(--side);padding:26px 12px 40px}
    .brand{padding:0 10px 18px;border-bottom:1px solid var(--line-dark)}
    .brand h1{font-family:var(--serif);font-size:24px;line-height:1.2;margin:0 0 6px}
    .brand p{margin:0;color:var(--sub);font-size:13px}
    .navgroup{padding-top:16px}
    .glabel{font-size:12px;color:var(--faint);letter-spacing:2px;padding:0 10px 6px}
    .nav{width:100%;display:flex;align-items:center;justify-content:space-between;border:0;background:transparent;color:var(--sub);text-align:left;padding:9px 10px;border-radius:6px;cursor:pointer}
    .nav:hover{background:#E8DFD3}
    .nav.on{background:var(--ink);color:#F6F3EC}
    .nav .cnt{font-size:12px;color:var(--faint)}
    .nav.on .cnt{color:#CEC5B4}
    .main{flex:1;min-width:0;max-width:1440px;padding:28px 34px 72px}
    .top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
    .crumb{font-size:13px;color:var(--sub)}
    .mode{display:flex;border:1px solid var(--line-dark);border-radius:6px;overflow:hidden;background:var(--panel);flex-shrink:0}
    .mode button{border:0;background:transparent;padding:7px 14px;color:var(--sub);cursor:pointer;font-size:13px}
    .mode button.on{background:var(--ink);color:#F6F3EC}
    h2{font-family:var(--serif);font-size:30px;line-height:1.2;margin:8px 0 4px}
    .desc{color:var(--sub);margin:0 0 22px;max-width:900px}
    .kpis{display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:12px;margin:20px 0 24px}
    .kpi{background:var(--panel);border:1px solid var(--line);padding:15px 16px}
    .kpi .v{font-family:var(--serif);font-size:29px;font-weight:700;line-height:1}
    .kpi .l{font-size:13px;color:var(--sub);margin-top:6px}
    .kpi.good .v{color:var(--green)}
    .kpi.warn .v{color:var(--red)}
    .sec{margin:0 0 28px}
    .shead{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:7px;margin-bottom:12px}
    .shead h3{font-family:var(--serif);font-size:20px;margin:0}
    .hint{margin-left:auto;color:var(--faint);font-size:13px}
    .panel{background:var(--panel);border:1px solid var(--line);padding:16px}
    .conclusion{border-left:4px solid var(--ink);font-family:var(--serif);font-size:20px}
    .conclusion p{margin:0 0 8px}
    .grid{display:grid;gap:14px}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .tag{display:inline-flex;align-items:center;white-space:nowrap;border-radius:999px;padding:2px 9px;font-size:12px;background:var(--gray-bg);color:var(--gray)}
    .tag.green{background:var(--green-bg);color:var(--green)}
    .tag.red{background:var(--red-bg);color:var(--red)}
    .tag.blue{background:var(--blue-bg);color:var(--blue)}
    .tag.amber{background:var(--amber-bg);color:var(--amber)}
    .muted{color:var(--faint)}
    .small{font-size:13px;color:var(--sub)}
    .link{color:var(--blue);text-decoration:none}
    .link:hover{text-decoration:underline}
    table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line)}
    th,td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}
    th{font-size:12px;color:var(--faint);font-weight:600;letter-spacing:1px}
    tr:hover td{background:#FBF8F2}
    .quote{font-family:var(--serif);font-size:16px}
    .card{background:var(--panel);border:1px solid var(--line);padding:14px 15px;border-radius:6px}
    .card h4{margin:0 0 6px;font-size:17px}
    .lineitem{padding:8px 0;border-top:1px solid var(--line)}
    .lineitem:first-of-type{border-top:0}
    .list{display:grid;gap:8px}
    .blocker{border-left:4px solid var(--amber)}
    .blocker.client{border-left-color:var(--blue)}
    .metric .value{font-family:var(--serif);font-size:30px;font-weight:700}
    .metric .delta{font-weight:700;color:var(--green)}
    .bars{display:flex;align-items:flex-end;gap:5px;height:72px;margin-top:10px}
    .bar{flex:1;min-width:8px;background:var(--ink);opacity:.86}
    .bar.zero{background:var(--red);opacity:1}
    .spark{width:140px;height:34px;margin-top:4px}
    .timeline{display:grid;gap:10px}
    .event{display:grid;grid-template-columns:96px 1fr;gap:12px;align-items:start}
    .event .date{color:var(--faint);font-size:13px;text-align:right;padding-top:14px}
    .event .body{background:var(--panel);border:1px solid var(--line);padding:13px 14px}
    .tabs{display:flex;border-bottom:2px solid var(--ink);margin-bottom:16px;overflow:auto}
    .tab{border:1px solid var(--line);border-bottom:0;background:var(--panel);padding:9px 14px;cursor:pointer;color:var(--sub)}
    .tab.on{background:var(--ink);color:#F6F3EC}
    .form{max-width:720px;background:var(--panel);border:1px solid var(--line);padding:18px}
    .fr{margin-bottom:13px}
    .fr label{display:block;color:var(--sub);font-size:13px;margin-bottom:5px}
    .fr input,.fr select,.fr textarea{width:100%;border:1px solid var(--line-dark);background:#FBF8F2;border-radius:5px;padding:10px;color:var(--ink)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{border:0;border-radius:5px;background:var(--ink);color:#F6F3EC;padding:10px 16px;cursor:pointer}
    .btn.secondary{background:var(--gray-bg);color:var(--ink)}
    .notice{background:var(--blue-bg);color:var(--blue);border:1px solid #CFD9E7;padding:12px 14px;margin-bottom:14px}
    .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:0 0 14px}
    .filters input,.filters select{border:1px solid var(--line-dark);background:var(--panel);border-radius:5px;padding:8px 10px;color:var(--ink);min-width:180px}
    .inline-edit{display:grid;gap:6px;margin-top:8px}
    .inline-edit select,.inline-edit input{border:1px solid var(--line-dark);background:#FBF8F2;border-radius:4px;padding:6px 8px;width:100%}
    .road{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .road .card{min-height:150px}
    .road .phase{font-size:13px;color:var(--faint)}
    .audit{font-family:ui-monospace,Consolas,monospace;font-size:13px;white-space:pre-wrap;overflow:auto}
    @media(max-width:980px){
      .side{display:none}
      .main{padding:20px 14px}
      .kpis,.grid.three,.grid.two,.road{grid-template-columns:1fr}
      .event{grid-template-columns:1fr}
      .event .date{text-align:left}
      .row2{grid-template-columns:1fr}
      h2{font-size:26px}
      .conclusion{font-size:18px}
      table{font-size:14px}
      th,td{padding:9px 8px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side" id="side"></aside>
    <main class="main" id="main">
      <div class="panel" style="margin:28px">
        <h2>COCO 工作台加载中</h2>
        <p class="desc">如果这里长时间不变，说明页面脚本没有正常启动。</p>
      </div>
    </main>
  </div>
  <script src="./data.js"></script>
  <script>
    window.addEventListener("error", function(event){
      var main = document.getElementById("main");
      if (main) {
        main.innerHTML = '<div class="panel" style="margin:28px;border-left:4px solid var(--red)"><h2>页面脚本报错</h2><p class="desc">'+String(event.message || "未知错误").replace(/[<>&"]/g, function(m){return {"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[m];})+'</p><p class="small">请把这段错误发给 Codex。</p></div>';
      }
    });
    const DATA = window.WORKBENCH_DATA;
    if (!DATA) {
      document.getElementById("main").innerHTML = '<div class="panel" style="margin:28px"><h2>数据文件未加载</h2><p class="desc">页面需要同目录下的 data.js。若这是线上地址，请检查部署配置是否把 /data.js 错误重写成了 /index.html。</p></div>';
      throw new Error("WORKBENCH_DATA is missing");
    }
    const $ = (s) => document.querySelector(s);
    const fmt = (s) => String(s ?? "").replace(/[<>&"]/g, (m) => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[m]));
    let route = "board";
    let mode = "team";
    let submitTab = "deliverable";
    let currentRequests = [];
    let currentActions = [];
    const filters = {
      feedQ:"", deliverablesQ:"", deliverablesLine:"全部", requestsStatus:"全部",
      actionsStatus:"全部", filesQ:"", filesKind:"全部", seoQ:"", seoIssueStatus:"全部", preflightLevel:"全部"
    };
    const nav = {
      "决策": ["board","preflight","roadmap"],
      "过程": ["feed","deliverables","requests","actions","meetings"],
      "积累": ["data","seo","files","audit"],
      "操作": ["submit","roster"]
    };
    const routeKeys = Object.values(nav).flat();
    const filterKeys = ["feedQ","deliverablesQ","deliverablesLine","requestsStatus","actionsStatus","filesQ","filesKind","seoQ","seoIssueStatus","preflightLevel"];
    const submitKeys = ["deliverable","request","metric","file"];
    const names = {
      board:"本周白板", preflight:"会前自查", roadmap:"路线图", feed:"动态流", deliverables:"交付",
      requests:"客户事项", actions:"Actions", meetings:"会议", data:"数据中心", files:"文件库", audit:"导入审计",
      seo:"SEO中心", submit:"录入", roster:"名单"
    };
    const localKey = "coco-workbench-local-v1";
    const emptyLocal = () => ({deliverables:[],requests:[],metrics:[],files:[],requestUpdates:{},actionUpdates:{}});
    const readLocal = () => {
      let v;
      try {
        v = JSON.parse(localStorage.getItem(localKey) || "null") || emptyLocal();
      } catch (e) {
        localStorage.removeItem(localKey);
        v = emptyLocal();
      }
      v.deliverables = v.deliverables || [];
      v.requests = v.requests || [];
      v.metrics = v.metrics || [];
      v.files = v.files || [];
      v.requestUpdates = v.requestUpdates || {};
      v.actionUpdates = v.actionUpdates || {};
      return v;
    };
    const writeLocal = (v) => localStorage.setItem(localKey, JSON.stringify(v));
    function allDeliverables(){ return [...readLocal().deliverables, ...DATA.deliverables].sort((a,b)=>String(b.date).localeCompare(String(a.date))); }
    function allRequests(){
      const local = readLocal();
      return [...local.requests, ...DATA.requests]
        .map((r) => ({...r, ...(local.requestUpdates[r.id] || {})}))
        .sort((a,b)=>String(b.date).localeCompare(String(a.date)));
    }
    function allActions(){
      const local = readLocal();
      return DATA.actions
        .map((a) => ({...a, ...(local.actionUpdates[a.id] || {})}))
        .sort((a,b)=>String(b.date).localeCompare(String(a.date)) || (a.priority === "高" ? -1 : 1));
    }
    function opt(value, current){ return '<option value="'+fmt(value)+'" '+(value===current?"selected":"")+'>'+fmt(value)+'</option>'; }
    function tag(text, tone=""){ return '<span class="tag '+tone+'">'+fmt(text)+'</span>'; }
    function statusTone(s){
      if (/待贵方|待对齐|阻塞|逾期/.test(s)) return "red";
      if (/处理中|进行中/.test(s)) return "amber";
      if (/完成|已回应|已发布/.test(s)) return "green";
      return "blue";
    }
    function requestStatusOptions(current){
      return ["待回应","处理中","已回应","待对齐","待贵方提供"].map((x) => opt(x, current)).join("");
    }
    function actionStatusOptions(current){
      return ["未开始","进行中","完成","阻塞"].map((x) => opt(x, current)).join("");
    }
    function spark(series){
      const nums = (series || []).map(Number).filter((n) => Number.isFinite(n));
      if (nums.length < 2) return "";
      const w=140,h=34,p=3,max=Math.max(...nums),min=Math.min(...nums),rng=max-min||1;
      const pts=nums.map((v,i)=>((p+i*(w-2*p)/(nums.length-1)).toFixed(1))+","+((h-p-(v-min)/rng*(h-2*p)).toFixed(1))).join(" ");
      const last = pts.split(" ").pop().split(",");
      return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" aria-hidden="true"><polyline points="'+pts+'" fill="none" stroke="var(--green)" stroke-width="2"/><circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.5" fill="var(--green)"/></svg>';
    }
    function setTeamMode(){ mode = "team"; render(); }
    function setClientMode(){ mode = "client"; render(); }
    function goIndex(i){ route = routeKeys[i] || "board"; render(); }
    function submitIndex(i){ submitTab = submitKeys[i] || "deliverable"; render(); }
    function filterInput(i, value){ filters[filterKeys[i]] = value; render(); }
    function textMatch(item, q){
      const needle = String(q || "").trim().toLowerCase();
      if (!needle) return true;
      return JSON.stringify(item).toLowerCase().includes(needle);
    }
    function top(title, desc){
      return '<div class="top"><div class="crumb"><b>'+fmt(DATA.meta.client)+'</b> · '+fmt(DATA.meta.weekRange)+'</div><div class="mode"><button class="'+(mode==="team"?"on":"")+'" onclick="setTeamMode()">团队视图</button><button class="'+(mode==="client"?"on":"")+'" onclick="setClientMode()">客户视图</button></div></div><h2>'+fmt(title)+'</h2><p class="desc">'+fmt(desc)+'</p>';
    }
    function renderSide(){
      const counts = { preflight: DATA.preflight.length, feed: allDeliverables().length, requests: allRequests().length, actions: allActions().length, files: DATA.files.length };
      $("#side").innerHTML =
        '<div class="brand"><h1>'+fmt(DATA.meta.client)+' 工作台</h1><p>'+fmt(DATA.meta.fee)+' · 负责人 '+fmt(DATA.meta.lead)+'</p><p>v1 · Notion 导入版</p></div>' +
        Object.entries(nav).map(([g, items]) =>
          '<div class="navgroup"><div class="glabel">'+fmt(g)+'</div>' +
          items.map((k) => '<button class="nav '+(route===k?"on":"")+'" onclick="goIndex('+routeKeys.indexOf(k)+')"><span>'+fmt(names[k])+'</span>'+(counts[k]?'<span class="cnt">'+counts[k]+'</span>':"")+'</button>').join("") +
          '</div>'
        ).join("");
    }
    function boardView(){
      const ds = allDeliverables();
      const reqs = allRequests();
      const thisWeek = ds.filter((d) => d.date >= DATA.meta.weekStart && d.date <= DATA.meta.weekEnd);
      const kpis = [
        ["本周交付", thisWeek.length, "good"],
        ["累计交付", ds.length, "good"],
        ["SEO页面", DATA.importAudit.tables.seoPages, "good"],
        ["会议记录", DATA.meetings.length, ""],
        ["未闭环事项", reqs.filter((r) => r.status !== "已回应").length, "warn"]
      ].map((k) => '<div class="kpi '+k[2]+'"><div class="v">'+fmt(k[1])+'</div><div class="l">'+fmt(k[0])+'</div></div>').join("");
      const reqRows = reqs.slice(0,8).map((r) =>
        '<tr><td class="small">'+fmt(r.date)+'</td><td>'+tag(r.status,statusTone(r.status))+'</td><td><div class="quote">'+fmt(r.quote)+'</div></td>'+(mode==="team"?'<td>'+fmt(r.owner)+'</td>':"")+'<td class="small">'+fmt(r.response)+'</td></tr>'
      ).join("");
      const lineBlocks = DATA.lines.map((line) => {
        const rows = thisWeek.filter((d) => d.line === line.key).slice(0,8);
        return '<div class="card"><h4>'+fmt(line.label)+' <span class="small">主负责 '+fmt(line.primary)+'</span></h4>' +
          (rows.length ? rows.map((d) => '<div class="lineitem small"><b>'+fmt(d.title)+'</b><br>'+tag(d.type,"blue")+' '+tag(d.status,statusTone(d.status))+' '+(mode==="team"?fmt(d.owner):"")+'</div>').join("") : '<div class="small" style="color:var(--red)">本周无交付</div>') +
          '</div>';
      }).join("");
      const metricCards = DATA.metrics.map((m) =>
        '<div class="card metric"><div class="small">'+fmt(m.name)+'</div><div class="value">'+fmt(m.value)+'</div><div class="delta">'+fmt(m.change)+'</div>'+spark(m.series)+'</div>'
      ).join("");
      const blockers = DATA.board.blockers.filter((b) => mode === "team" || b.client).map((b) =>
        '<div class="card blocker '+(b.client?"client":"")+'"><b>'+fmt(b.item)+'</b><div class="small">需要：'+fmt(b.need)+'</div></div>'
      ).join("");
      const actions = (DATA.latestMeeting && DATA.latestMeeting.actions ? DATA.latestMeeting.actions : []).slice(0,6).map((a) =>
        '<tr><td>'+fmt(a.task)+'</td><td>'+fmt(a.owner)+'</td><td>'+tag(a.status,statusTone(a.status))+'</td><td>'+tag(a.priority,a.priority==="高"?"red":"amber")+'</td></tr>'
      ).join("");
      return top("本周白板", "结论、客户事项、交付、数据和会议动作从结构化资料自动汇总。原始聊天和转录不在页面渲染。") +
        '<div class="kpis">'+kpis+'</div>' +
        '<section class="sec"><div class="panel conclusion">'+DATA.board.conclusion.map((x) => '<p>'+fmt(x)+'</p>').join("")+'</div></section>' +
        '<section class="sec"><div class="shead"><h3>客户在说什么 + 我们回应</h3><span class="hint">未闭环置顶</span></div><table><thead><tr><th>日期</th><th>状态</th><th>事项</th>'+(mode==="team"?"<th>负责人</th>":"")+'<th>回应</th></tr></thead><tbody>'+reqRows+'</tbody></table></section>' +
        '<section class="sec"><div class="shead"><h3>'+(mode==="client"?"待贵方配合":"卡点与待对齐")+'</h3></div><div class="list">'+blockers+'</div></section>' +
        '<section class="sec"><div class="shead"><h3>上次会议 Action</h3><span class="hint">'+fmt(DATA.latestMeeting ? DATA.latestMeeting.date : "")+'</span></div><table><thead><tr><th>任务</th><th>负责人</th><th>状态</th><th>优先级</th></tr></thead><tbody>'+actions+'</tbody></table></section>' +
        '<section class="sec"><div class="shead"><h3>本周交付</h3><span class="hint">零交付条线显式显示</span></div><div class="grid three">'+lineBlocks+'</div></section>' +
        '<section class="sec"><div class="shead"><h3>数据看板</h3></div><div class="grid three">'+metricCards+'</div></section>' +
        '<section class="sec"><div class="shead"><h3>下周计划</h3></div><div class="list">'+DATA.board.nextWeek.map((x) => '<div class="card">'+fmt(x)+'</div>').join("")+'</div></section>';
    }
    function feedView(){
      const events = [
        ...allDeliverables().slice(0,90).map((d) => ({date:d.date,type:d.type,line:d.line,who:d.owner,text:d.title,link:d.pub,status:d.status})),
        ...allRequests().map((r) => ({date:r.date,type:"客户事项",line:"沟通",who:r.owner,text:r.quote,status:r.status}))
      ].filter((e) => textMatch(e, filters.feedQ)).sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,120);
      return top("工作动态流", "交付、发布和客户事项按时间倒序合并。") +
        '<div class="filters"><input value="'+fmt(filters.feedQ)+'" oninput="filterInput(0,this.value)" placeholder="搜索动态、负责人、条线"></div>' +
        '<div class="timeline">'+events.map((e) => '<div class="event"><div class="date">'+fmt(e.date)+'</div><div class="body">'+tag(e.type,"blue")+' '+tag(e.line)+' '+tag(e.status,statusTone(e.status||""))+' '+(mode==="team"?'<span class="small">负责人 '+fmt(e.who)+'</span>':"")+'<div style="margin-top:6px">'+fmt(e.text)+'</div>'+(e.link?'<a class="link small" target="_blank" href="'+fmt(e.link)+'">打开链接</a>':"")+'</div></div>').join("")+'</div>';
    }
    function deliverablesView(){
      const lineOptions = ["全部", ...DATA.lines.map((l) => l.key)].map((x) => opt(x, filters.deliverablesLine)).join("");
      const filtered = allDeliverables()
        .filter((d) => filters.deliverablesLine === "全部" || d.line === filters.deliverablesLine)
        .filter((d) => textMatch(d, filters.deliverablesQ))
        .slice(0,240);
      const rows = filtered.map((d) =>
        '<tr><td>'+fmt(d.date)+'</td><td>'+tag(d.line)+'</td><td>'+tag(d.type,"blue")+'</td><td><b>'+fmt(d.title)+'</b><div class="small">'+fmt(d.note||"")+'</div></td>'+(mode==="team"?'<td>'+fmt(d.owner)+'</td>':"")+'<td>'+tag(d.status,statusTone(d.status))+'</td><td>'+(d.pub?'<a class="link" target="_blank" href="'+fmt(d.pub)+'">查看</a>':"")+'</td></tr>'
      ).join("");
      return top("交付时间线", "已从 SEO 页面、视频、社媒文本、领英/公众号等 Notion 表导入。") +
        '<div class="filters"><input value="'+fmt(filters.deliverablesQ)+'" oninput="filterInput(1,this.value)" placeholder="搜索标题、负责人、来源"><select onchange="filterInput(2,this.value)">'+lineOptions+'</select><span class="small">当前 '+filtered.length+' 条</span></div>' +
        '<table><thead><tr><th>日期</th><th>条线</th><th>类型</th><th>交付</th>'+(mode==="team"?"<th>负责人</th>":"")+'<th>状态</th><th>链接</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function requestsView(){
      const statuses = ["全部","待回应","处理中","已回应","待对齐","待贵方提供"].map((x) => opt(x, filters.requestsStatus)).join("");
      currentRequests = allRequests().filter((r) => filters.requestsStatus === "全部" || r.status === filters.requestsStatus);
      const rows = currentRequests.map((r, i) =>
        '<tr><td>'+fmt(r.date)+'</td><td>'+fmt(r.source)+'</td><td><div class="quote">'+fmt(r.quote)+'</div></td><td>'+tag(r.status,statusTone(r.status))+
        (mode==="team"?'<div class="inline-edit"><select id="req-status-'+i+'">'+requestStatusOptions(r.status)+'</select><input id="req-response-'+i+'" value="'+fmt(r.response || "")+'" placeholder="更新回应"><button class="btn secondary" onclick="saveRequestUpdate('+i+')">更新</button></div>':"")+
        '</td>'+(mode==="team"?'<td>'+fmt(r.owner)+'</td>':"")+'<td class="small">'+fmt(r.response)+'</td></tr>'
      ).join("");
      return top("客户事项", "只放未闭环和关键跟进项，避免把聊天记录当流水账。") +
        '<div class="filters"><select onchange="filterInput(3,this.value)">'+statuses+'</select><span class="small">当前 '+currentRequests.length+' 条</span></div>' +
        '<table><thead><tr><th>日期</th><th>来源</th><th>事项</th><th>状态</th>'+(mode==="team"?"<th>负责人</th>":"")+'<th>回应</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function actionsView(){
      const statuses = ["全部","未开始","进行中","完成","阻塞"].map((x) => opt(x, filters.actionsStatus)).join("");
      currentActions = allActions().filter((a) => filters.actionsStatus === "全部" || a.status === filters.actionsStatus);
      const rows = currentActions.map((a, i) =>
        '<tr><td>'+fmt(a.date)+'</td><td><b>'+fmt(a.task)+'</b><div class="small">'+fmt(a.meetingTitle)+'</div></td><td>'+fmt(a.owner)+'</td><td>'+tag(a.status,statusTone(a.status))+
        (mode==="team"?'<div class="inline-edit"><select id="act-status-'+i+'">'+actionStatusOptions(a.status)+'</select><button class="btn secondary" onclick="saveActionUpdate('+i+')">更新状态</button></div>':"")+
        '</td><td>'+tag(a.priority,a.priority==="高"?"red":"amber")+'</td></tr>'
      ).join("");
      return top("Action Items", "跨会议聚合的任务看板，按状态快速筛选。") +
        '<div class="filters"><select onchange="filterInput(4,this.value)">'+statuses+'</select><span class="small">当前 '+currentActions.length+' 条</span></div>' +
        '<table><thead><tr><th>会议日期</th><th>任务</th><th>负责人</th><th>状态</th><th>优先级</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function preflightView(){
      const levels = ["全部","高","中"].map((x) => opt(x, filters.preflightLevel)).join("");
      const items = DATA.preflight.filter((x) => filters.preflightLevel === "全部" || x.level === filters.preflightLevel);
      const rows = items.map((x) =>
        '<tr><td>'+tag(x.level,x.level==="高"?"red":"amber")+'</td><td>'+tag(x.type,"blue")+'</td><td><b>'+fmt(x.text)+'</b></td><td>'+fmt(x.owner || "")+'</td></tr>'
      ).join("");
      const summary = items.length ? '发现 '+items.length+' 个需要会前处理的点。' : '当前没有发现会前风险项。';
      return top("会前自查", "自动扫描零交付条线、超 3 天未闭环事项、上次会议未完成 Action 和未闭环 SEO 问题。") +
        '<div class="notice">'+fmt(summary)+'</div><div class="filters"><select onchange="filterInput(9,this.value)">'+levels+'</select></div>' +
        '<table><thead><tr><th>级别</th><th>类型</th><th>问题</th><th>负责人</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function dataView(){
      const blocks = DATA.lines.map((line) => {
        const weekly = DATA.lineWeekly[line.key] || [];
        const max = Math.max(1, ...weekly.map((x) => x.count));
        const bars = weekly.map((x) => '<div class="bar '+(x.count ? "" : "zero")+'" title="'+fmt(x.week)+': '+x.count+'" style="height:'+Math.max(5,Math.round(x.count/max*66))+'px"></div>').join("");
        const lineMetrics = DATA.metrics.filter((m) => m.line === line.key || (line.key === "内容" && m.name.includes("社媒")) || (line.key === "视频剪辑" && m.name.includes("视频")));
        return '<section class="sec"><div class="shead"><h3>'+fmt(line.label)+'</h3><span class="hint">主负责 '+fmt(line.primary)+'</span></div><div class="grid three">'+
          lineMetrics.map((m) => '<div class="card metric"><div class="small">'+fmt(m.name)+'</div><div class="value">'+fmt(m.value)+'</div><div class="delta">'+fmt(m.change)+'</div>'+spark(m.series)+'</div>').join("")+
          '</div><div class="panel" style="margin-top:12px"><div class="small">近周交付节奏</div><div class="bars">'+bars+'</div></div></section>';
      }).join("");
      return top("数据中心", "按条线看指标趋势和交付节奏。断更周用红色柱显示。") + blocks;
    }
    function seoView(){
      const issueStatuses = ["全部", ...Array.from(new Set(DATA.seoIssues.map((x) => x.status)))].map((x) => opt(x, filters.seoIssueStatus)).join("");
      const pages = DATA.seoPages.filter((p) => textMatch(p, filters.seoQ));
      const issues = DATA.seoIssues
        .filter((x) => filters.seoIssueStatus === "全部" || x.status === filters.seoIssueStatus)
        .filter((x) => textMatch(x, filters.seoQ));
      const pageRows = pages.map((p) =>
        '<tr><td><b>'+fmt(p.title)+'</b><div class="small">'+fmt(p.keyword || "关键词待补")+'</div></td><td>'+fmt(p.onlineDate || "")+'</td><td>'+tag(p.status,statusTone(p.status))+'</td><td>'+tag(p.canonical,p.canonical==="一致"?"green":"amber")+'</td><td>'+tag(p.tdk,p.tdk==="完整"?"green":"amber")+'</td><td>'+fmt(p.impressions || "-")+'</td><td>'+fmt(p.clicks || "-")+'</td></tr>'
      ).join("");
      const issueRows = issues.map((x) =>
        '<tr><td><b>'+fmt(x.issue)+'</b><div class="small">'+fmt(x.note)+'</div></td><td>'+fmt(x.owner)+'</td><td>'+tag(x.status,statusTone(x.status))+'</td><td>'+fmt(x.targetDate || "")+'</td><td>'+fmt(x.doneAt || "")+'</td></tr>'
      ).join("");
      return top("SEO中心", "集中查看 SEO 页面铺设、收录状态和技术问题闭环。") +
        '<div class="filters"><input value="'+fmt(filters.seoQ)+'" oninput="filterInput(7,this.value)" placeholder="搜索页面、关键词、问题"><select onchange="filterInput(8,this.value)">'+issueStatuses+'</select></div>' +
        '<section class="sec"><div class="shead"><h3>SEO 页面追踪</h3><span class="hint">'+pages.length+' 页</span></div><table><thead><tr><th>页面</th><th>上线</th><th>收录</th><th>Canonical</th><th>TDK</th><th>曝光</th><th>点击</th></tr></thead><tbody>'+pageRows+'</tbody></table></section>' +
        '<section class="sec"><div class="shead"><h3>SEO 技术问题</h3><span class="hint">'+issues.length+' 条</span></div><table><thead><tr><th>问题</th><th>人员</th><th>状态</th><th>目标完成</th><th>完成时间</th></tr></thead><tbody>'+issueRows+'</tbody></table></section>';
    }
    function meetingsView(){
      const cards = DATA.meetings.map((m) =>
        '<div class="card"><h4>'+fmt(m.title)+'</h4><div class="small">'+fmt(m.source)+' · Action '+fmt(m.actionCount)+' 条 · 原始转录不上站</div><div style="margin-top:8px">'+m.points.map((p) => '<div>'+fmt(p)+'</div>').join("")+'</div></div>'
      ).join("");
      return top("会议归档", "展示脱敏后的摘要和 Action 数；原始转录、聊天记录只作为内部语料。") + '<div class="grid two">'+cards+'</div>';
    }
    function filesView(){
      const kinds = ["全部", ...Array.from(new Set(DATA.files.map((f) => f.kind)))].map((x) => opt(x, filters.filesKind)).join("");
      const files = DATA.files
        .filter((f) => filters.filesKind === "全部" || f.kind === filters.filesKind)
        .filter((f) => textMatch(f, filters.filesQ))
        .slice(0,260);
      const rows = files.map((f) =>
        '<tr><td>'+tag(f.kind,"blue")+'</td><td><b>'+fmt(f.title)+'</b><div class="small">'+fmt(f.path)+'</div></td><td>'+fmt(Math.round(f.size/1024))+' KB</td><td>'+tag(f.visibility,"amber")+'</td><td class="small">'+fmt(f.note)+'</td></tr>'
      ).join("");
      return top("文件库", "Notion 导入资料的内部索引。原文不上站，先作为追溯入口。") +
        '<div class="filters"><input value="'+fmt(filters.filesQ)+'" oninput="filterInput(5,this.value)" placeholder="搜索资料名或路径"><select onchange="filterInput(6,this.value)">'+kinds+'</select><span class="small">当前 '+files.length+' 条</span></div>' +
        '<table><thead><tr><th>类型</th><th>资料</th><th>大小</th><th>可见性</th><th>说明</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function roadmapView(){
      return top("路线图", "把 COCO 服务以来的主要阶段收敛成推进路线。") +
        '<div class="road">'+DATA.roadmap.map((r) => '<div class="card"><div class="phase">'+fmt(r.phase)+'</div><h4>'+fmt(r.title)+'</h4><p class="small">'+fmt(r.note)+'</p></div>').join("")+'</div>';
    }
    function rosterView(){
      const rows = DATA.team.map((p) => '<tr><td><b>'+fmt(p.name)+'</b></td><td>'+fmt(p.group)+'</td><td>'+p.roles.map((r) => tag(r,"blue")).join(" ")+'</td></tr>').join("");
      return top("名单", "当前为只读名单，后续接 team.yaml / meta.yaml。") +
        '<table><thead><tr><th>成员</th><th>组别</th><th>角色</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function auditView(){
      return top("导入审计", "记录本轮从 zip 中导入和排除的资料。") +
        '<div class="panel audit">'+fmt(JSON.stringify(DATA.importAudit,null,2))+'</div><div class="notice" style="margin-top:14px">已排除用户另外提到的客户工作原则、团队画像、人格分析与工作安排建议类文档，也排除了 zip 中明显的团队成员资料、账号列表和聊天记录存档。</div>';
    }
    function submitView(){
      const tabs = [["deliverable","登记交付"],["request","客户事项"],["metric","录数据点"],["file","上传物料"]].map((t, i) =>
        '<button class="tab '+(submitTab===t[0]?"on":"")+'" onclick="submitIndex('+i+')">'+t[1]+'</button>'
      ).join("");
      const people = DATA.team.map((p) => '<option>'+fmt(p.name)+'</option>').join("");
      let form = "";
      if (submitTab === "deliverable") {
        form = '<div class="form"><div class="row2"><div class="fr"><label>日期</label><input id="f-date" value="'+fmt(DATA.meta.weekEnd)+'"></div><div class="fr"><label>类型</label><select id="f-type"><option>社媒发布</option><option>视频</option><option>SEO页面</option><option>深度报告</option><option>个人IP内容</option><option>活动支持</option><option>方案文档</option></select></div></div><div class="row2"><div class="fr"><label>条线</label><select id="f-line"><option>内容</option><option>视频剪辑</option><option>SEO</option></select></div><div class="fr"><label>负责人</label><select id="f-owner">'+people+'</select></div></div><div class="fr"><label>一句话说明</label><input id="f-title" placeholder="例：Google Cloud 活动复盘软文初稿"></div><div class="fr"><label>链接</label><input id="f-pub" placeholder="https://"></div><button class="btn" onclick="saveDeliverable()">保存</button></div>';
      }
      if (submitTab === "request") {
        form = '<div class="form"><div class="row2"><div class="fr"><label>日期</label><input id="r-date" value="'+fmt(DATA.meta.weekEnd)+'"></div><div class="fr"><label>状态</label><select id="r-status"><option>待回应</option><option>处理中</option><option>已回应</option><option>待对齐</option><option>待贵方提供</option></select></div></div><div class="row2"><div class="fr"><label>来源</label><select id="r-source"><option>客户</option><option>查理</option><option>会议</option><option>其他</option></select></div><div class="fr"><label>负责人</label><select id="r-owner">'+people+'</select></div></div><div class="fr"><label>客户原话 / 事项</label><textarea id="r-quote" rows="3"></textarea></div><div class="fr"><label>我们的回应</label><textarea id="r-response" rows="3"></textarea></div><button class="btn" onclick="saveRequest()">保存</button></div>';
      }
      if (submitTab === "metric") {
        form = '<div class="form"><div class="row2"><div class="fr"><label>日期</label><input id="m-date" value="'+fmt(DATA.meta.weekEnd)+'"></div><div class="fr"><label>指标名</label><select id="m-name">'+DATA.metrics.map((m) => '<option>'+fmt(m.name)+'</option>').join("")+'</select></div></div><div class="fr"><label>当期值</label><input id="m-value" placeholder="数字或文本"></div><button class="btn" onclick="saveMetric()">保存</button></div>';
      }
      if (submitTab === "file") {
        form = '<div class="form"><div class="fr"><label>物料类型</label><select id="file-kind"><option>会议转录</option><option>聊天记录</option><option>文档</option><option>报告</option><option>视频</option></select></div><div class="fr"><label>标题</label><input id="file-title"></div><div class="fr"><label>外部链接 / 文件说明</label><input id="file-link" placeholder="视频和大文件先填外部链接"></div><button class="btn" onclick="saveFile()">保存</button></div>';
      }
      return top("录入", "第一版先保存到浏览器本地数据，线上版会替换为 GitHub 写回。") +
        '<div class="notice">保存后会立刻出现在当前浏览器的白板、动态流或事项表里。</div><div class="tabs">'+tabs+'</div>'+form+
        '<div style="margin-top:14px"><button class="btn secondary" onclick="exportLocal()">导出本地提交 JSON</button> <button class="btn secondary" onclick="clearLocal()">清空本地数据</button></div>';
    }
    function saveDeliverable(){
      const l = readLocal();
      l.deliverables.unshift({
        id:"local-"+Date.now(), date:$("#f-date").value, line:$("#f-line").value,
        type:$("#f-type").value, owner:$("#f-owner").value, title:$("#f-title").value,
        status:"本地新增", pub:$("#f-pub").value, note:"本地演示提交"
      });
      writeLocal(l); route="board"; render();
    }
    function saveRequest(){
      const l = readLocal();
      l.requests.unshift({
        id:"local-"+Date.now(), date:$("#r-date").value, source:$("#r-source").value,
        quote:$("#r-quote").value, status:$("#r-status").value, owner:$("#r-owner").value,
        response:$("#r-response").value, updated:$("#r-date").value
      });
      writeLocal(l); route="requests"; render();
    }
    function saveRequestUpdate(i){
      const r = currentRequests[i];
      if (!r) return;
      const l = readLocal();
      l.requestUpdates[r.id] = {
        status: $("#req-status-"+i).value,
        response: $("#req-response-"+i).value,
        updated: new Date().toISOString().slice(0,10)
      };
      writeLocal(l);
      render();
    }
    function saveActionUpdate(i){
      const a = currentActions[i];
      if (!a) return;
      const l = readLocal();
      l.actionUpdates[a.id] = {
        status: $("#act-status-"+i).value,
        updated: new Date().toISOString().slice(0,10)
      };
      writeLocal(l);
      render();
    }
    function saveMetric(){
      const l = readLocal();
      l.metrics.unshift({ date:$("#m-date").value, name:$("#m-name").value, value:$("#m-value").value });
      writeLocal(l); alert("已保存到本地数据。");
    }
    function saveFile(){
      const l = readLocal();
      l.files.unshift({ kind:$("#file-kind").value, title:$("#file-title").value, link:$("#file-link").value, date:new Date().toISOString().slice(0,10) });
      writeLocal(l); alert("已保存到本地数据。");
    }
    function exportLocal(){
      const blob = new Blob([JSON.stringify(readLocal(),null,2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "coco-workbench-local-submissions.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function clearLocal(){
      if (confirm("清空本地数据？")) {
        localStorage.removeItem(localKey);
        render();
      }
    }
    function render(){
      try {
        renderSide();
        const views = {
          board:boardView, feed:feedView, deliverables:deliverablesView, requests:requestsView,
          actions:actionsView, preflight:preflightView, data:dataView, seo:seoView, files:filesView, meetings:meetingsView, roadmap:roadmapView, roster:rosterView,
          audit:auditView, submit:submitView
        };
        $("#main").innerHTML = views[route]();
        window.scrollTo(0,0);
      } catch (e) {
        $("#main").innerHTML = '<div class="panel" style="margin:28px;border-left:4px solid var(--red)"><h2>页面渲染报错</h2><p class="desc">'+fmt(e && e.message ? e.message : e)+'</p><p class="small">这不是网址问题，是页面脚本停住了。把这段错误发给 Codex。</p></div>';
      }
    }
    render();
  </script>
</body>
</html>
