function weekPanel(w){const agenda=wcard({topic:"会议议程",owner:"侯明真",summary:"这张卡固定打头，用来控制会议顺序和时间。",agenda:w.agenda});const cards=w.cards.filter(c=>!(mode==="client"&&c.internal)).map(wcard).join("");return `<div class="board-head"><div class="board-date">${esc(w.date)}</div><div class="board-title">${esc(w.title)}</div></div><div class="conclusion">${esc(w.conclusion)}</div>${agenda}${cards}${suppCards(w.supplements)}`}

function agenda(a){return `<ol class="agenda">${a.map((x,i)=>`<li><span><span class="anum">${i+1}</span>${esc(x.n)}</span><span class="atime">${esc(x.t||"")}</span></li>`).join("")}</ol>`}

function gantt(g){const cols=g.months.reduce((a,m)=>a+m.w,0),tmpl=`grid-template-columns:220px repeat(${cols},minmax(42px,1fr))`;let months="",labels="";g.months.forEach(m=>{months+=`<div class="gcell" style="grid-column:span ${m.w};text-align:center">${esc(m.m)}</div>`;for(let i=0;i<m.w;i++)labels+=`<div class="gcell">${esc(m.labels?m.labels[i]:"W"+(i+1))}</div>`});const today=((g.today||0)+.5)/cols*100;const rows=g.tasks.map(t=>{const l=t.start/cols*100,w=t.span/cols*100;return `<div class="grow" style="${tmpl}"><div class="gcell glabel"><span class="ptag ${t.pri}">${esc(t.pri)}</span>${esc(t.name)}<div class="small">${esc(t.meta||"")}</div></div><div class="gcell track" style="grid-column:span ${cols}"><div class="today" style="left:${today}%"></div><div class="bar ${t.state}" style="left:${l}%;width:${w}%">${t.state==="done"?"已完成":t.state==="doing"?"进行中":"计划"}</div></div></div>`}).join("");return `<div class="glegend"><span><i style="background:var(--ink)"></i>已完成</span><span><i style="background:var(--red)"></i>进行中</span><span><i style="background:var(--bluebg);border:1px dashed var(--blue)"></i>计划</span><span>黄线=今天</span></div><div class="gantt"><div class="grow" style="${tmpl}"><div class="gcell"></div>${months}</div><div class="grow" style="${tmpl}"><div class="gcell small">任务</div>${labels}</div>${rows}</div>`}
function problems(p){const sec=(title,arr)=>arr&&arr.length?`<div class="sg">${title}</div>${arr.map(x=>`<div class="si">${badge(x.s)}<b>${esc(x.name)}</b><span class="desc">${esc(x.desc)}</span><span class="ptag ${x.pri}">${esc(x.pri)}</span></div>`).join("")}`:"";return `<div class="problems">${sec("已解决（绿）",p.solved)}${sec("待修复 / 待对齐（红）",p.todo)}</div>`}
function social(s){const head=`<tr><th>平台</th><th>指标</th>${s.weeks.map(w=>`<th>${esc(w)}</th>`).join("")}</tr>`;const body=s.rows.map(r=>Object.entries(r.metrics).map((m,i)=>`<tr>${i===0?`<td rowspan="${Object.keys(r.metrics).length}"><b>${esc(r.plat)}</b></td>`:""}<td>${esc(m[0])}</td>${m[1].map(v=>`<td class="${/浏览|播放|阅读/.test(m[0])?"hl":""}">${esc(v)}</td>`).join("")}</tr>`).join("")).join("");return `<div style="overflow:auto"><table class="tbl"><thead>${head}</thead><tbody>${body}</tbody></table></div><div class="linkrow" style="margin-top:10px">${link(s.url,"看飞书源链接 ↗")}</div>`}

function spark(s){if(!s||s.length<2)return "";const w=128,h=30,p=3,mx=Math.max(...s),mn=Math.min(...s),r=(mx-mn)||1,pts=s.map((v,i)=>`${p+i*(w-2*p)/(s.length-1)},${h-p-(v-mn)/r*(h-2*p)}`).join(" ");return `<svg class="spark" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="1.8"/></svg>`}

function suppCards(s){if(!s)return"";return `${wcard({topic:"客户开口的事",owner:"侯明真",summary:"只放未闭环或本次会必须处理的客户原话。",table:{cols:["日期","来源","客户原话","状态","负责人","我们的回应"],rows:s.requests.map(r=>[r.date,r.source,r.quote,r.status,mode==="client"?"":r.owner,r.resp])}})}${wcard({topic:"客户动向",summary:s.psych})}${wcard({topic:"下次会必须问清楚",summary:"这些问题不问清楚，下周执行会继续反复。",agenda:s.mustAsk.map(x=>({n:x,t:""}))})}${wcard({topic:"下周计划",summary:"下周计划不显示负责人，避免把执行分工放到客户视图里。",agenda:s.nextWeek.map(x=>({n:x,t:""}))})}`}
function feedView(){const ev=DB.weeks.flatMap(w=>(w.supplements?.requests||[]).map(r=>({date:r.date,type:"客户",title:r.quote,text:r.resp,who:r.owner}))).map(e=>`<div class="event"><div class="small">${esc(e.date)}</div><div class="ecard">${badge(e.type)}<div class="etitle">${esc(e.title)}</div><div>${esc(e.text)}</div>${mode==="client"?"":`<div class="small">${esc(e.who)}</div>`}</div></div>`).join("");return topbar("工作动态")+`<h2 class="pagetitle">工作动态</h2><p class="pagedesc">动态流只做追踪，不覆盖每周白板。</p><div class="timeline">${ev}</div>`}
function requestsView(){const rows=DB.weeks.flatMap(w=>(w.supplements?.requests||[])).map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.source)}</td><td>${esc(r.quote)}</td><td>${badge(r.status)}</td>${mode==="client"?"":`<td>${esc(r.owner)}</td>`}<td>${esc(r.resp)}</td></tr>`).join("");return topbar("客户开口的事")+`<h2 class="pagetitle">客户开口的事</h2><p class="pagedesc">这是系统补充卡的来源，不和白板主卡混在一起。</p><div class="sec"><table class="tbl"><thead><tr><th>日期</th><th>来源</th><th>客户原话</th><th>状态</th>${mode==="client"?"":"<th>负责人</th>"}<th>回应</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function deliverablesView(){const all=[];DB.weeks.forEach(w=>w.cards.forEach(c=>{if(c.deliveries)Object.entries(c.deliveries).forEach(([k,arr])=>arr.forEach(d=>all.push({...d,kind:k,date:w.date})))}));const cards=all.map(d=>`<div class="deliver"><div class="small">${esc(d.date)} · ${esc(d.kind)}</div><h3>${esc(d.title)}</h3>${mode==="client"?"":`<div class="small">${esc(d.owner)}</div>`}<div class="linkrow">${d.link?link(d.link,(d.plat||"平台")+"↗"):badge(d.status||"待发布")}</div></div>`).join("");return topbar("交付与内容库")+`<h2 class="pagetitle">交付与内容库</h2><p class="pagedesc">只收录能汇报、能复用、能追溯的交付。</p><div class="deliver-grid">${cards}</div>`}
function dataView(){const boxes=DB.weeks[0].cards.filter(c=>c.social||c.metrics||c.problems).map(c=>`<div class="statusbox"><h3>${esc(c.topic)}</h3><div>${esc(c.summary)}</div></div>`).join("");return topbar("数据中心")+`<h2 class="pagetitle">数据中心</h2><p class="pagedesc">外部数据做镜像，源链接保留，不在系统里手改。</p><div class="status-grid">${boxes}</div>`}
function ganttView(){const gs=DB.weeks.flatMap(w=>w.cards.filter(c=>c.gantt).map(c=>`<div class="sec"><div class="shead"><h3>${esc(c.topic)}</h3><span class="hint">黄线=今天</span></div><div class="sbody">${gantt(c.gantt)}</div></div>`)).join("");return topbar("完整甘特")+`<h2 class="pagetitle">完整甘特</h2><p class="pagedesc">所有进度甘特汇总。</p>${gs}`}
function submitView(){return topbar("录入")+`<h2 class="pagetitle">录入</h2><p class="pagedesc">成员录入交付、客户要求、数据点；系统在下一次白板自动归类为话题卡或补充卡。</p><div class="sec"><div class="sbody"><form id="entry-form"><div class="formgrid"><div class="field"><label>类型</label><select><option>交付</option><option>客户开口</option><option>数据点</option><option>文件链接</option></select></div><div class="field"><label>是否进入白板</label><select><option>进入本周补充卡</option><option>进入话题卡</option><option>只做证据</option></select></div></div><div class="field" style="margin-top:12px"><label>一句话说明</label><textarea></textarea></div><button class="btn" style="margin-top:12px">保存草稿</button></form></div></div>`}
function saveDraft(e){e.preventDefault();alert("已保存为本机草稿，后续接飞书后自动同步。")}
window.addEventListener("hashchange",()=>{route=location.hash.replace("#","")||"board";render()});
render();
</script>
</body>
</html>
