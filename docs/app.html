<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户工作台 · 郎瀚威团队</title>
<style>
/* 设计系统与 BD 工作台一致（姊妹站）。Codex 只改最下方 DB，不动渲染。 */
:root{
  --bg:#F6F3EC; --panel:#FFFFFF; --ink:#211C15; --sub:#7A7163; --faint:#A89E8E;
  --line:#E6DFD0; --line-dark:#D5CCB9;
  --green:#2E5E4E; --green-bg:#EAF1ED; --amber:#9A6B1F; --amber-bg:#F6EEDC;
  --gray:#8A8276; --gray-bg:#EFEBE2; --red:#B5432E; --red-bg:#F8E9E5;
  --blue:#3E5A7E; --blue-bg:#E8EEF5;
  --serif:"Noto Serif SC","Songti SC",serif;
  --sans:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.65}
a{color:inherit}
.app{display:flex;min-height:100vh}
.side{width:236px;flex-shrink:0;border-right:1px solid var(--line-dark);padding:26px 0 40px;position:sticky;top:0;height:100vh;overflow-y:auto}
.side .brand{padding:0 22px 16px;border-bottom:1px solid var(--line)}
.side .brand h1{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:.5px}
.side .brand .tagline{font-size:12px;color:var(--sub);margin-top:2px}
.side .brand .ver{font-size:11px;color:var(--faint);margin-top:7px}
.navgroup{padding:15px 12px 0}
.navgroup .glabel{font-size:11px;color:var(--faint);letter-spacing:2px;padding:0 10px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--sub);font-size:13.5px}
.nav-item:hover{background:#EFEAE0}
.nav-item.on{background:var(--ink);color:#F6F3EC}
.nav-item .cnt{margin-left:auto;font-size:11px;color:var(--faint)}
.nav-item.on .cnt{color:#CFC8B8}
.main{flex:1;min-width:0;padding:28px 36px 80px;max-width:1480px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:4px}
.crumb{font-size:12px;color:var(--faint)}
.crumb b{color:var(--sub);font-weight:500}
.modetoggle{display:inline-flex;border:1px solid var(--line-dark);border-radius:6px;overflow:hidden;flex-shrink:0}
.modetoggle button{padding:6px 15px;font-size:12.5px;background:var(--panel);border:none;cursor:pointer;color:var(--sub);font-family:var(--sans)}
.modetoggle button.on{background:var(--ink);color:#F6F3EC}
h2.pagetitle{font-family:var(--serif);font-size:34px;font-weight:700;letter-spacing:0;margin:6px 0 4px}
.pagedesc{color:var(--sub);font-size:16px;margin-bottom:20px;max-width:980px}

.kpis{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.kpi{background:var(--panel);border:1px solid var(--line);padding:13px 18px;min-width:120px;flex:1}
.kpi .v{font-family:var(--serif);font-size:25px;font-weight:700;line-height:1}
.kpi .l{font-size:11px;color:var(--sub);letter-spacing:.5px;margin-top:5px}
.kpi.good .v{color:var(--green)}

.stagebar{display:flex;border:1px solid var(--line);background:var(--panel);margin-bottom:8px}
.stg{flex:1;text-align:center;padding:10px 6px;font-size:12.5px;color:var(--faint);border-right:1px solid var(--line)}
.stg:last-child{border-right:none}.stg.done{background:var(--green-bg);color:var(--green)}
.stg.now{background:var(--ink);color:#F6F3EC;font-weight:600}.stg .d{display:block;font-size:10px;opacity:.82;margin-top:2px}

.oneliner{border-left:4px solid var(--ink);background:var(--panel);padding:16px 20px;margin-bottom:20px;font-family:var(--serif);font-size:22px;line-height:1.65}
.oneliner.empty{border-left-color:var(--faint);color:var(--faint);font-family:var(--sans);font-size:13.5px}
.oneliner .who{font-family:var(--sans);font-size:11px;color:var(--faint);margin-top:6px}

.tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.tag.hi{background:var(--green-bg);color:var(--green)}.tag.mid{background:var(--amber-bg);color:var(--amber)}
.tag.lo{background:var(--gray-bg);color:var(--gray)}.tag.soft{background:var(--red-bg);color:var(--red)}
.tag.fresh{background:var(--blue-bg);color:var(--blue)}.tag.tbd{background:transparent;border:1px dashed var(--line-dark);color:var(--faint)}
.tag.auto{background:var(--blue-bg);color:var(--blue)}.tag.ok{background:var(--green-bg);color:var(--green)}
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;flex-shrink:0;vertical-align:middle}
.who-inline{display:inline-flex;align-items:center;gap:6px}
.small{font-size:12px;color:var(--sub)} .muted{color:var(--faint)}
.linkchip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 9px;border-radius:4px;background:var(--blue-bg);color:var(--blue);text-decoration:none;cursor:pointer}
.linkchip:hover{text-decoration:underline}

.sec{margin-bottom:26px}
.sec>.shead{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:7px;margin-bottom:13px}
.sec>.shead .num{font-family:var(--serif);font-size:14px;color:var(--faint);font-weight:700}
.sec>.shead h3{font-family:var(--serif);font-size:16px;font-weight:700}
.sec>.shead .hint{margin-left:auto;font-size:12px;color:var(--faint)}

table.t{width:100%;border-collapse:collapse;background:var(--panel)}
table.t th{font-size:11px;color:var(--faint);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--line);letter-spacing:1px;white-space:nowrap}
table.t td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px}
table.t tr:hover td{background:#FBF9F4}
.q{font-family:var(--serif);font-size:13.5px;color:#3a352c}

/* 白板：当前态 + 周时间线 + 选中周 */
.boardlayout{display:grid;grid-template-columns:208px 1fr;gap:24px;align-items:start}
.wktl{border-left:1px solid var(--line)}
.wktl .wk{position:relative;padding:9px 10px 9px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
.wktl .wk:hover{background:#FBF9F4}
.wktl .wk.on{background:var(--ink)}
.wktl .wk.on .d,.wktl .wk.on .t,.wktl .wk.on .one{color:#F6F3EC}
.wktl .wk::before{content:"";position:absolute;left:-5px;top:14px;width:9px;height:9px;border-radius:50%;background:var(--line-dark)}
.wktl .wk.on::before{background:var(--red);box-shadow:0 0 0 3px var(--red-bg)}
.wktl .wk .d{font-family:var(--serif);font-size:13px;font-weight:700}
.wktl .wk .t{font-size:11px;color:var(--sub)}
.wktl .wk .one{font-size:10.5px;color:var(--faint);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wktl .wk .reddot{color:var(--red);font-size:10px;margin-left:4px}
.wkpanel{min-width:0}
.wkhead{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.wkhead .wd{font-family:var(--serif);font-size:24px;font-weight:700}

.blocker{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);padding:11px 15px;margin-bottom:7px}
.blocker.client{border-left-color:var(--blue)}
.blocker .bi{font-size:13.5px;margin-bottom:4px}
.blocker .need{font-size:12px;font-weight:600;color:var(--amber)}.blocker.client .need{color:var(--blue)}
.psych{background:var(--amber-bg);border:1px solid #EADFC2;padding:11px 15px;font-size:13.5px;border-radius:4px}
.linegroup{margin-bottom:14px}
.linegroup .lh{font-family:var(--serif);font-size:13.5px;font-weight:700;padding:5px 0;display:flex;gap:8px;align-items:center}
.linegroup .lh .pri{font-size:11px;color:var(--faint);font-weight:400}
.delivery{background:var(--panel);border:1px solid var(--line);padding:9px 13px;margin-bottom:5px;display:flex;align-items:center;gap:10px}
.delivery .grow{flex:1} .delivery .dt{font-size:11px;color:var(--faint)}
.emptyline{font-size:12px;color:var(--red);background:var(--red-bg);padding:7px 13px;border-radius:4px}
.metricgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.metric{background:var(--panel);border:1px solid var(--line);padding:13px 15px}
.metric .ml{font-size:11px;color:var(--sub);margin-bottom:6px;display:flex;justify-content:space-between;gap:6px}
.metric .rowm{display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
.metric .v{font-family:var(--serif);font-size:24px;font-weight:700;line-height:1}
.metric .delta{font-size:12px;font-weight:600}.metric .delta.up{color:var(--green)}.metric .delta.dn{color:var(--red)}
.metric .prev{font-size:11px;color:var(--faint);margin-top:5px} .metric .foot{margin-top:8px}
.metric.stale{opacity:.7}.metric.stale .v{color:var(--faint)}
.plan{list-style:none}.plan li{background:var(--panel);border:1px solid var(--line);padding:9px 13px;margin-bottom:5px;font-size:13.5px}
.ask{list-style:none}.ask li{padding:6px 0;border-bottom:1px dashed var(--line);font-size:13.5px}.ask li::before{content:"？ ";color:var(--red);font-weight:700}
.archive{border:1px solid var(--line);background:var(--panel);padding:13px 15px}
.shotwall{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:9px}
.shot{background:var(--gray-bg);border:1px solid var(--line);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;text-align:center;font-size:10.5px;color:var(--sub);padding:7px}

/* 全客户总览 */
.cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.ccard{background:var(--panel);border:1px solid var(--line);padding:16px 18px;cursor:pointer}
.ccard:hover{border-color:var(--ink)}
.ccard.dim{opacity:.55;cursor:default}
.ccard .ct{display:flex;align-items:baseline;justify-content:space-between}
.ccard .cn{font-family:var(--serif);font-size:18px;font-weight:700}
.ccard .cf{font-size:12px;color:var(--sub)}
.ccard .cone{font-size:12.5px;color:var(--sub);margin:8px 0;min-height:34px}
.ccard .cmeta{display:flex;gap:12px;font-size:11px;color:var(--faint);align-items:center}
.ccard .rf{color:var(--red);font-weight:600}

/* 社媒看板 */
.platgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.platcard{background:var(--panel);border:1px solid var(--line);padding:13px 15px}
.platcard .pn{font-family:var(--serif);font-size:14px;font-weight:700;margin-bottom:7px}
.platcard .pstats{display:flex;gap:16px;margin-bottom:7px}
.platcard .num{font-family:var(--serif);font-size:18px;font-weight:700}.platcard .lab{font-size:10px;color:var(--faint)}
.platlinks{display:flex;gap:6px;margin-top:7px}

/* 甘特 */
.gantt{border:1px solid var(--line);background:var(--panel);overflow-x:auto}
.gantt .gridrow{display:grid}.gantt .lab{padding:8px 12px}
.g-month{font-family:var(--serif);font-weight:700;font-size:11px;color:var(--sub);text-align:center;border-left:1px solid var(--line);padding:6px 0}
.g-wk{font-size:10px;color:var(--faint);text-align:center;border-left:1px solid var(--line);padding:4px 0}
.g-phase .pl{grid-column:1 / -1;background:var(--gray-bg);padding:7px 12px;font-family:var(--serif);font-size:13px;font-weight:700;border-top:1px solid var(--line)}
.g-phase .pl .pnote{font-family:var(--sans);font-size:11px;color:var(--sub);font-weight:400;margin-left:8px}
.g-task{display:grid;border-top:1px solid var(--line)}
.g-task .lab{font-size:12.5px;border-right:1px solid var(--line)}.g-task .lab .meta{display:block;font-size:11px;color:var(--faint);margin-top:2px}
.track{position:relative;min-height:36px;background:repeating-linear-gradient(to right,transparent 0,transparent calc(100%/var(--c) - 1px),var(--line) calc(100%/var(--c) - 1px),var(--line) calc(100%/var(--c)))}
.bar{position:absolute;top:7px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden}
.bar.done{background:var(--ink);color:#F6F3EC}.bar.doing{background:var(--red);color:#fff}.bar.plan{background:var(--blue-bg);color:var(--blue);border:1px dashed var(--blue)}
.todayline{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);opacity:.75}
.ptag{font-size:9px;padding:0 5px;border-radius:99px;border:1px solid var(--line-dark);color:var(--faint);margin-right:5px;font-weight:600}
.ptag.P0{background:var(--red-bg);color:var(--red);border-color:transparent}.ptag.P1{background:var(--amber-bg);color:var(--amber);border-color:transparent}.ptag.P2{background:var(--gray-bg);color:var(--gray);border-color:transparent}
.glegend{display:flex;gap:16px;font-size:11px;color:var(--sub);margin-bottom:10px}.glegend i{display:inline-block;width:16px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}

/* 时间线/动态流 */
.tline .ev{display:flex;gap:12px}
.tline .dt{width:58px;flex-shrink:0;font-size:11px;color:var(--faint);padding-top:14px;text-align:right}
.tline .rail{width:12px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.tline .dot{width:9px;height:9px;border-radius:50%;background:var(--line-dark);margin-top:18px}.tline .ev.key .dot{background:var(--red);box-shadow:0 0 0 3px var(--red-bg)}
.tline .bar2{width:1.5px;flex:1;background:var(--line)}
.tline .body{flex:1;background:var(--panel);border:1px solid var(--line);padding:10px 13px;margin:8px 0}
.tline .meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.evt{font-size:10px;padding:1px 7px;border-radius:3px}.evt.deliver{background:var(--green-bg);color:var(--green)}.evt.req{background:var(--amber-bg);color:var(--amber)}.evt.metric{background:var(--blue-bg);color:var(--blue)}.evt.file{background:var(--gray-bg);color:var(--sub)}

/* 录入 */
.form{background:var(--panel);border:1px solid var(--line);padding:20px 22px;max-width:600px}
.form .fr{margin-bottom:13px}.form label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px}
.form select,.form input,.form textarea{width:100%;border:1px solid var(--line-dark);background:var(--bg);padding:9px 11px;font-family:var(--sans);font-size:13px;border-radius:5px;color:var(--ink)}
.form textarea{min-height:64px;resize:vertical}.form .row2{display:flex;gap:12px}.form .row2>*{flex:1}
.submitbtn{padding:9px 22px;background:var(--ink);color:#F6F3EC;border:none;border-radius:5px;font-size:13.5px;cursor:pointer;font-family:var(--sans)}
.quickbox{background:var(--panel);border:1px solid var(--line);padding:18px;max-width:600px;margin-bottom:16px}
.quickbox textarea{width:100%;border:1px solid var(--line-dark);background:var(--bg);padding:11px;font-family:var(--sans);font-size:14px;border-radius:6px;min-height:70px;resize:vertical}
.aihint{font-size:12px;color:var(--blue);margin-top:8px}

/* 白板话题卡（照真实白板：红标题 + 负责人 + 总结 + 实物） */
.wcard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px 18px;margin-bottom:14px}
.wcard-h{display:flex;align-items:baseline;gap:10px;margin-bottom:11px;border-bottom:1px solid var(--line);padding-bottom:8px}
.wcard-h .ct{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--red)}
.wcard-h .co{margin-left:auto;font-size:12px;color:var(--sub);white-space:nowrap}
.wcard-h .co b{color:var(--ink)}
.wsum{font-size:16px;margin-bottom:10px;line-height:1.75}
.wsub{font-family:var(--serif);font-size:13.5px;font-weight:700;color:var(--red);margin:12px 0 6px}
.agd{list-style:none}
.agd li{padding:8px 0;font-size:16px;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between;gap:10px}
.agd li .anum{font-family:var(--serif);font-weight:700;color:var(--faint);margin-right:8px}
.agd li .at{color:var(--faint);font-size:11px;white-space:nowrap}
.smatrix{width:100%;border-collapse:collapse;font-size:12px;overflow-x:auto;display:block}
.smatrix table{width:100%;border-collapse:collapse}
.smatrix th{background:var(--gray-bg);color:var(--sub);font-weight:500;padding:6px 8px;border:1px solid var(--line);text-align:center;font-size:11px;white-space:nowrap}
.smatrix td{padding:5px 8px;border:1px solid var(--line);text-align:center;white-space:nowrap}
.smatrix td.pl{text-align:left;font-weight:600;background:#FBF9F4}
.smatrix td.pl .po{display:block;font-size:10px;color:var(--faint);font-weight:400}
.smatrix td.hl{font-family:var(--serif);font-weight:700}
.statuslist{margin-top:4px}
.statuslist .sg{font-size:12px;color:var(--sub);margin:8px 0 4px;font-weight:600}
.statuslist .si{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px}
.statuslist .si .nm{font-weight:600;min-width:150px}
.statuslist .si .desc{flex:1;color:var(--sub);font-size:12px}
.linkgroup{margin-bottom:10px}
.linkgroup .lgh{font-size:12.5px;font-weight:600;margin-bottom:5px}
.linkrow{display:flex;flex-wrap:wrap;gap:6px}
.cfg{margin-top:8px}

@media(max-width:900px){
  .side{display:none}.main{padding:18px 14px}
  .boardlayout{grid-template-columns:1fr}.metricgrid,.platgrid,.cgrid{grid-template-columns:1fr}.shotwall{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

/* ================= 渲染（Codex 不改） ================= */
const $=s=>document.querySelector(s);
let route="overview", mode="team", selWeek=0;
const NAV={
 team:{ 概览:["overview"], "客户 · COCO":["board","gantt","data"], 过程:["feed","requests","deliverables","meetings","files"], 操作:["submit","roster"] },
 client:{ "COCO 进展":["board","gantt","data"], 过程:["feed","requests","deliverables","meetings"] }
};
const VIEWS={ overview:"全客户总览",board:"白板",gantt:"项目路线图",data:"数据中心",feed:"工作动态流",requests:"客户事项",deliverables:"交付时间线",meetings:"会议",files:"物料",submit:"录入",roster:"团队名单" };

function esc(s){return String(s??"").replace(/[<>&"]/g,m=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[m]))}
function color(n){return DB.team[n]||"#8A8276"}
function av(n){return `<span class="av" style="background:${color(n)}">${esc((n||"?")[0])}</span>`}
function who(n){return `<span class="who-inline">${av(n)}<span>${esc(n)}</span></span>`}
function statusTag(s){const m={"处理中":"mid","已回应":"hi","待回应":"tbd","待对齐":"soft","待贵方提供":"fresh"};return `<span class="tag ${m[s]||"lo"}">${esc(s)}</span>`}
function link(u,l){return u?`<a class="linkchip" href="${esc(u)}" target="_blank">${esc(l)}</a>`:`<span class="tag tbd">${esc(l)}待补</span>`}
function pct(p,c){if(!p)return c?"新增":"—";const d=Math.round((c-p)/p*100);return (d>=0?"+":"")+d+"%"}
function spark(s){if(!s||s.length<2)return `<span class="small muted">趋势待补</span>`;const w=128,h=28,p=3,mx=Math.max(...s),mn=Math.min(...s),r=(mx-mn)||1;const pts=s.map((v,i)=>`${(p+i*(w-2*p)/(s.length-1)).toFixed(1)},${(h-p-(v-mn)/r*(h-2*p)).toFixed(1)}`).join(" ");const lst=pts.split(" ").pop().split(",");return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="1.5" stroke-linejoin="round"/><circle cx="${lst[0]}" cy="${lst[1]}" r="2.2" fill="var(--green)"/></svg>`}

function go(v){route=v;render();window.scrollTo(0,0)}
function setMode(m){mode=m;if(!Object.values(NAV[mode]).flat().includes(route))route="board";render()}
function pickWeek(i){selWeek=i;render()}
function bind(){document.querySelectorAll("[data-go]").forEach(e=>e.onclick=()=>go(e.dataset.go));document.querySelectorAll("[data-mode]").forEach(e=>e.onclick=()=>setMode(e.dataset.mode));document.querySelectorAll("[data-wk]").forEach(e=>e.onclick=()=>pickWeek(+e.dataset.wk))}
function render(){renderSide();const fn={overview:overviewView,board:boardView,gantt:ganttView,data:dataView,feed:feedView,requests:requestsView,deliverables:deliverablesView,meetings:meetingsView,files:filesView,submit:submitView,roster:rosterView}[route];$("#main").innerHTML=fn();bind()}

function renderSide(){
 const cnt={requests:DB.weeks[0].requests?DB.weeks[0].requests.length:0,feed:DB.feed.length};
 const item=k=>`<div class="nav-item ${route===k?"on":""}" data-go="${k}">${VIEWS[k]}${cnt[k]?`<span class="cnt">${cnt[k]}</span>`:""}</div>`;
 const nav=Object.entries(NAV[mode]).map(([g,ks])=>`<div class="navgroup"><div class="glabel">${g}</div>${ks.map(item).join("")}</div>`).join("");
 $("#sidebar").innerHTML=`<div class="brand"><h1>客户工作台</h1><div class="tagline">郎瀚威团队 · 多客户作战室</div><div class="ver">${esc(DB.meta.version)} · 更新 ${esc(DB.meta.updated)}</div></div>${nav}`;
}

/* 白板：当前态 + 周时间线 + 选中周 */
function boardView(){
 const c=DB.current, w=DB.weeks[selWeek], client=mode==="client";
 const kpis=c.kpis.map(k=>`<div class="kpi ${k.t}"><div class="v">${esc(k.v)}</div><div class="l">${esc(k.l)}</div></div>`).join("");
 const stg=`<div class="stagebar">${c.stage.steps.map(s=>`<div class="stg ${s.s}">${esc(s.n)}<span class="d">${esc(s.d)}</span></div>`).join("")}</div>`;
 const tl=DB.weeks.map((x,i)=>{
   const red=x.blockers?x.blockers.filter(b=>b.client||!client).length:0;
   return `<div class="wk ${i===selWeek?"on":""}" data-wk="${i}"><div class="d">${esc(x.date.slice(5))}${red?`<span class="reddot">● ${red}</span>`:""}</div><div class="t">${esc(x.title)}</div><div class="one">${esc(x.conclusion||"")}</div></div>`;
 }).join("");
 const panel = w.stub ? `<div class="wkhead"><span class="wd">${esc(w.date)}</span><span class="tag lo">${esc(w.title)}</span></div><div class="oneliner empty">${esc(w.conclusion)}</div><div class="small muted">这一周的白板会由该次会议分析 + 当周登记数据自动生成，目前为占位。</div>` : weekPanel(w,client);
 return topbar(`<b>COCO</b> · 白板`)+`
  <h2 class="pagetitle">COCO 白板</h2>
  <div class="pagedesc">按周时间线：左边选周，右边看那一周的白板。每周由会议分析 + 当周登记数据自动生成，负责人只改最上面的判断——不用再手搭白板。新人和老板从最早往下翻，就能熟悉这个客户怎么走到今天。</div>
  <div class="kpis">${kpis}</div>
  <div class="sec" style="margin-bottom:18px"><div class="shead"><h3>${esc(c.stage.label)}</h3><span class="hint"><span class="linkchip" data-go="gantt">看完整甘特 →</span></span></div>${stg}</div>
  <div class="boardlayout"><div class="wktl">${tl}</div><div class="wkpanel">${panel}</div></div>`;
}
function weekPanel(w,client){
 // 真实白板格式：本周重点 + 会议议程 + 一张张话题卡（带负责人 + 总结 + 实物）
 if(w.cards){
   const head=`<div class="wkhead"><span class="wd">${esc(w.date)}</span><span class="tag lo">${esc(w.title)}</span>${w.badge?`<span class="tag auto">${esc(w.badge)}</span>`:""}</div>`;
   const concl=`<div class="oneliner">${esc(w.conclusion)}<div class="who">本周重点 · 会前判断</div></div>`;
   const cards=w.cards.filter(c=>!(client&&c.internal)).map(wcard).join("");
   return head+concl+cards;
 }
 const blk=(w.blockers||[]).filter(x=>client?x.client:true);
 const blkH=blk.length?blk.map(x=>`<div class="blocker ${x.client?"client":""}"><div class="bi">${esc(x.item)}</div><div class="need">${x.client?"待贵方配合":"需"}：${esc(x.need)}</div>${x.owner?`<div class="small" style="margin-top:3px">跟进：${who(x.owner)}</div>`:""}</div>`).join(""):`<div class="small muted">本周无待配合事项</div>`;
 const reqH=(w.requests||[]).map(r=>`<tr><td class="small">${esc(r.date)}</td><td>${statusTag(r.status)}</td><td><div class="q">${esc(r.source)}：${esc(r.quote)}</div></td>${client?"":`<td>${who(r.owner)}</td>`}<td class="small">${esc(r.resp)}</td></tr>`).join("");
 const order=["内容","视频剪辑","SEO"], pri={内容:"田长举",视频剪辑:"周星星",SEO:"李家乐"};
 const deliv=order.map(L=>{const rows=(w.deliveries&&w.deliveries[L])||[];const body=rows.length?rows.map(d=>{const pub=d.pub?(d.pub.url?link(d.pub.url,d.pub.plat+" ↗"):`<span class="tag tbd">待发布</span>`):"";return `<div class="delivery"><div class="grow">${esc(d.title)}</div>${pub}${client?"":who(d.owner)}<span class="dt">${esc(d.date)}</span></div>`;}).join(""):`<div class="emptyline">本周无交付</div>`;return `<div class="linegroup"><div class="lh">${esc(L)} <span class="pri">· 主负责 ${esc(pri[L])}</span></div>${body}</div>`;}).join("");
 const mets=(w.metrics||[]).map(m=>{if(m.stale)return "";const up=m.cur>=m.prev;return `<div class="metric"><div class="ml"><span>${esc(m.name)}</span>${m.src?link(m.src,m.srclabel):""}</div><div class="rowm"><div class="v">${m.cur}</div><span class="delta ${up?"up":"dn"}">${pct(m.prev,m.cur)}</span></div><div class="prev">上期 ${m.prev} → 本期 ${m.cur}</div><div class="foot" style="display:flex;align-items:center;justify-content:space-between;gap:8px">${spark(m.series)}${m.owner?`<span class="small">${who(m.owner)}</span>`:""}</div></div>`;}).join("");
 const ask=(w.mustAsk||[]).map(x=>`<li>${esc(x)}</li>`).join("");
 const plan=(w.nextWeek||[]).map(x=>{const t=typeof x==="string"?x:x.t;return `<li>${esc(t)}</li>`;}).join("");
 const arch=client?"":`<div class="sec"><div class="shead"><h3>会议归档</h3><span class="hint">议程 + 截图，内部</span></div><div class="archive"><div class="small" style="margin-bottom:8px">议程：${(w.agenda||[]).map(esc).join(" · ")}</div><div class="shotwall">${(w.shots||[]).map(s=>`<div class="shot">${esc(s)}</div>`).join("")}</div></div></div>`;
 return `<div class="wkhead"><span class="wd">${esc(w.date)}</span><span class="tag lo">${esc(w.title)}</span>${w.badge?`<span class="tag auto">${esc(w.badge)}</span>`:""}</div>
  <div class="oneliner">${esc(w.conclusion)}<div class="who">本周重点 · 自动生成后由负责人确认</div></div>
  <div class="sec"><div class="shead"><h3>卡点 / 待对齐 / 待贵方配合</h3></div>${blkH}</div>
  ${reqH?`<div class="sec"><div class="shead"><h3>客户开口的事</h3><span class="hint">只记未闭环</span></div><table class="t"><thead><tr><th>日期</th><th>状态</th><th>事项</th>${client?"":"<th>负责人</th>"}<th>我们的回应</th></tr></thead><tbody>${reqH}</tbody></table></div>`:""}
  ${w.psych?`<div class="sec"><div class="shead"><h3>客户动向</h3><span class="hint">关注点变化，不是复述聊天</span></div><div class="psych">${esc(w.psych)}</div></div>`:""}
  <div class="sec"><div class="shead"><h3>本周交付</h3><span class="hint">已发布挂平台链接，零交付标红</span></div>${deliv}</div>
  ${mets?`<div class="sec"><div class="shead"><h3>本周数据</h3><span class="hint">带对比，可点开来源</span></div><div class="metricgrid">${mets}</div></div>`:""}
  ${ask?`<div class="sec"><div class="shead"><h3>下次会必须问清楚</h3></div><ul class="ask">${ask}</ul></div>`:""}
  ${plan?`<div class="sec"><div class="shead"><h3>下周计划</h3></div><ul class="plan">${plan}</ul></div>`:""}
  ${arch}`;
}

/* 甘特 */
function ganttChart(g,compact){
 const cols=g.months.reduce((a,m)=>a+m.w,0);const tmpl=`grid-template-columns:${compact?180:300}px repeat(${cols},minmax(${compact?22:28}px,1fr))`;
 const months=g.months.map(m=>`<div class="g-month" style="grid-column:span ${m.w}">${esc(m.m)}</div>`).join("");
 let wks="";g.months.forEach(m=>{for(let i=1;i<=m.w;i++)wks+=`<div class="g-wk">${esc(m.labels?m.labels[i-1]:"W"+i)}</div>`});
 const today=g.today!=null?((g.today)+0.5)/cols*100:-1;const lbl=s=>s==="done"?"已完成":s==="doing"?"进行中":"";
 const ph=g.phases.map(p=>{const ts=p.tasks.map(t=>{const left=t.start/cols*100,wd=t.span/cols*100;return `<div class="g-task" style="grid-template-columns:${compact?180:300}px 1fr"><div class="lab">${t.pri?`<span class="ptag ${t.pri}">${t.pri}</span>`:""}${esc(t.name)}<span class="meta">${esc(t.meta||"")}</span></div><div class="track" style="--c:${cols}">${today>=0?`<div class="todayline" style="left:${today}%"></div>`:""}<div class="bar ${t.state}" style="left:${left}%;width:${wd}%">${lbl(t.state)}</div></div></div>`}).join("");return (p.name?`<div class="gridrow g-phase" style="${tmpl}"><div class="pl">${esc(p.name)}<span class="pnote">${esc(p.note||"")}</span></div></div>`:"")+ts}).join("");
 return `<div class="glegend"><span><i style="background:var(--ink)"></i>已完成</span><span><i style="background:var(--red)"></i>进行中</span><span><i style="background:var(--blue-bg);border:1px dashed var(--blue)"></i>计划中</span></div><div class="gantt"><div class="gridrow" style="${tmpl}"><div class="lab"></div>${months}</div><div class="gridrow" style="${tmpl}"><div class="lab small" style="color:var(--faint)">任务 / 目标</div>${wks}</div>${ph}</div>`;
}
function cardTable(t){return `<div class="smatrix"><table><thead><tr>${t.cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${t.rows.map(r=>`<tr>${r.map((cell,i)=>`<td class="${i===0?"pl":""}">${esc(cell)}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`}
function socialMatrix(m){
 const head=`<tr><th>平台 / 负责人</th><th>指标</th>${m.weeks.map(w=>`<th>${esc(w)}</th>`).join("")}</tr>`;
 const body=m.rows.map(r=>{const ms=Object.entries(r.metrics);return ms.map((mm,i)=>`<tr>${i===0?`<td class="pl" rowspan="${ms.length}">${esc(r.plat)}${r.po?`<span class="po">${esc(r.po)}</span>`:""}</td>`:""}<td style="text-align:left;color:var(--sub)">${esc(mm[0])}</td>${mm[1].map(v=>`<td class="${mm[0].match(/浏览|播放|阅读/)?"hl":""}">${esc(v)}</td>`).join("")}</tr>`).join("")}).join("");
 return `<div class="smatrix"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>${m.link?`<div class="linkrow cfg">${link(m.url,m.link)}</div>`:""}`;
}
function problemList(p){
 const sec=(title,arr,cls)=>`<div class="sg" style="color:var(--${cls})">${title}</div>`+arr.map(x=>`<div class="si"><span class="tag ${cls==="green"?"hi":"soft"}">${esc(x.s)}</span><span class="nm">${esc(x.name)}</span><span class="desc">${esc(x.desc||"")}</span>${x.pri?`<span class="ptag ${x.pri.startsWith("P0")?"P0":"P1"}">${esc(x.pri)}</span>`:""}</div>`).join("");
 return `<div class="statuslist">${p.solved?sec("● 已解决",p.solved,"green"):""}${p.todo?sec("● 待修复",p.todo,"red"):""}</div>`;
}
function linkGroups(gs){return gs.map(g=>`<div class="linkgroup"><div class="lgh">${esc(g.h)}</div><div class="linkrow">${g.items.map(it=>link(it.url,it.label)).join("")}</div></div>`).join("")}
function wcard(c){
 const head=`<div class="wcard-h"><span class="ct">${esc(c.topic)}</span>${c.owner?`<span class="co">负责人：<b>${esc(c.owner)}</b></span>`:""}</div>`;
 let body="";
 if(c.type==="agenda"){body=`<ul class="agd">${c.items.map((a,i)=>`<li><span><span class="anum">${i+1}</span>${esc(a.n)}</span><span class="at">${esc(a.t||"")}</span></li>`).join("")}</ul>`;}
 else{
   if(c.summary)body+=`<div class="wsum">${esc(c.summary)}</div>`;
   if(c.gantt)body+=`<div class="cfg">${ganttChart(c.gantt,true)}</div>`;
   if(c.sub)c.sub.forEach(s=>{body+=`<div class="wsub">${esc(s.h)}</div>`;if(s.summary)body+=`<div class="wsum">${esc(s.summary)}</div>`;if(s.table)body+=cardTable(s.table);if(s.problems)body+=problemList(s.problems);if(s.gantt)body+=`<div class="cfg">${ganttChart(s.gantt,true)}</div>`;if(s.links)body+=`<div class="linkrow cfg">${s.links.map(l=>link(l.url,l.label)).join("")}</div>`;});
   if(c.table)body+=cardTable(c.table);
   if(c.matrix)body+=socialMatrix(c.matrix);
   if(c.problems)body+=problemList(c.problems);
   if(c.groups)body+=linkGroups(c.groups);
   if(c.links)body+=`<div class="linkrow cfg">${c.links.map(l=>link(l.url,l.label)).join("")}</div>`;
   if(c.note)body+=`<div class="small cfg" style="color:var(--blue)">${esc(c.note)}</div>`;
 }
 return `<div class="wcard">${head}${body}</div>`;
}
function ganttView(){
 const charts=DB.gantt.map(g=>`<div class="sec"><div class="shead"><h3>${esc(g.title)}</h3><span class="hint">黄线为本周</span></div>${ganttChart(g)}</div>`).join("");
 return topbar(`<b>COCO</b> · 项目路线图`)+`<h2 class="pagetitle">项目路线图</h2><div class="pagedesc">阶段、任务、目标与进度的甘特视图——一眼看到现在铺到哪、下一步做什么。</div>${charts}`;
}

/* 数据中心 + 社媒看板 */
function dataView(){
 const blocks=DB.data.lines.map(L=>{const mets=L.metrics.map(m=>{const last=m.series[m.series.length-1],prev=m.series[m.series.length-2];return `<div class="metric"><div class="ml"><span>${esc(m.name)}</span>${m.src?link(m.src,m.srclabel):""}</div><div class="rowm"><div class="v">${last}</div><span class="delta ${last>=prev?"up":"dn"}">${pct(prev,last)}</span></div><div class="prev">历史最高 ${m.top}</div><div class="foot">${spark(m.series)}</div></div>`}).join("");const mw=Math.max(...L.weeks);const bars=L.weeks.map(cc=>{const h=Math.round(cc/mw*40)+4;return `<div style="flex:1;text-align:center"><div style="height:${h}px;background:${cc===0?"var(--red)":"var(--ink)"};margin:0 auto"></div><div style="font-size:10px;color:var(--faint);margin-top:3px">${cc}</div></div>`}).join("");return `<div class="sec"><div class="shead"><h3>${esc(L.label)}</h3><span class="hint">主负责 ${esc(L.primary)}</span></div><div class="metricgrid" style="margin-bottom:14px">${mets}</div><div class="small" style="margin-bottom:6px">近 8 周交付节奏（断更周标红）</div><div style="display:flex;gap:6px;align-items:flex-end;background:var(--panel);border:1px solid var(--line);padding:12px 14px">${bars}</div></div>`}).join("");
 const plat=DB.social.map(s=>`<div class="platcard"><div class="pn">${esc(s.name)}</div><div class="pstats"><div><div class="num">${esc(s.fans)}</div><div class="lab">粉丝</div></div><div><div class="num" style="font-size:13px;padding-top:4px">${esc(s.inter)}</div><div class="lab">近况</div></div></div>${s.series&&s.series.length>1?spark(s.series):""}<div class="platlinks">${link(s.board,"数据看板 ↗")}${link(s.link,"主页 ↗")}</div></div>`).join("");
 return topbar(`<b>COCO</b> · 数据中心`)+`<h2 class="pagetitle">数据中心</h2><div class="pagedesc">按条线积累的趋势、交付节奏，加各平台社媒看板（点开看实时数据）。</div>${blocks}<div class="sec"><div class="shead"><h3>社媒看板</h3><span class="hint">点开看各平台实时数据</span></div><div class="platgrid">${plat}</div></div>`;
}

function feedView(){const lab={deliver:"交付",req:"沟通",metric:"数据",file:"文件"};let h="";DB.feed.forEach((e,i)=>{h+=`<div class="ev ${e.type==="req"?"key":""}"><div class="dt">${esc(e.date.split(" ")[1]||"")}<br>${esc(e.date.split(" ")[0])}</div><div class="rail"><div class="dot"></div>${i<DB.feed.length-1?'<div class="bar2"></div>':""}</div><div class="body"><div class="meta"><span class="evt ${e.type}">${lab[e.type]}</span><span class="tag lo">${esc(e.line)}</span>${mode==="team"?who(e.who):""}</div>${esc(e.text)}</div></div>`});return topbar(`<b>COCO</b> · 工作动态流`)+`<h2 class="pagetitle">工作动态流</h2><div class="pagedesc">项目每天的进展流水，随时掌握、无需等周会同步。</div><div class="tline">${h}</div>`}

function requestsView(){const all=[];DB.weeks.forEach(w=>(w.requests||[]).forEach(r=>all.push(r)));const rows=all.map(r=>`<tr><td class="small">${esc(r.date)}</td><td>${esc(r.source)}</td><td><div class="q">${esc(r.quote)}</div></td><td>${statusTag(r.status)}</td>${mode==="team"?`<td>${who(r.owner)}</td>`:""}<td class="small">${esc(r.resp)}</td></tr>`).join("");return topbar(`<b>COCO</b> · 客户事项`)+`<h2 class="pagetitle">客户事项（只记未闭环）</h2><div class="pagedesc">客户开口、需要跟到闭环的事才登记；已回应过一周自动收口。白板"客户开口的事"的来源。</div><table class="t"><thead><tr><th>日期</th><th>来源</th><th>事项</th><th>状态</th>${mode==="team"?"<th>负责人</th>":""}<th>我们的回应</th></tr></thead><tbody>${rows}</tbody></table>`}

function deliverablesView(){const all=[];DB.weeks.forEach(w=>{if(w.deliveries)Object.entries(w.deliveries).forEach(([L,arr])=>arr.forEach(d=>all.push({...d,line:L})))});all.sort((a,b)=>b.date.localeCompare(a.date));const rows=all.map(d=>{const pub=d.pub?(d.pub.url?link(d.pub.url,d.pub.plat+" ↗"):`<span class="tag tbd">待发布</span>`):"";return `<tr><td class="small">${esc(d.date)}</td><td><span class="tag lo">${esc(d.line)}</span></td><td>${esc(d.title)}</td>${mode==="team"?`<td>${who(d.owner)}</td>`:""}<td>${pub}</td></tr>`}).join("");return topbar(`<b>COCO</b> · 交付时间线`)+`<h2 class="pagetitle">交付时间线</h2><div class="pagedesc">全部交付按时间倒序，已发布挂平台链接。</div><table class="t"><thead><tr><th>日期</th><th>条线</th><th>交付</th>${mode==="team"?"<th>负责人</th>":""}<th>链接</th></tr></thead><tbody>${rows}</tbody></table>`}

function meetingsView(){const rows=DB.weeks.map(w=>`<tr><td class="small">${esc(w.date)}</td><td>${esc(w.title)}</td><td class="small">${w.stub?'<span class="tag tbd">回填中</span>':esc((w.conclusion||"").slice(0,40)+"…")}</td><td><span class="linkchip" data-go="board">看白板 →</span></td></tr>`).join("");return topbar(`<b>COCO</b> · 会议`)+`<h2 class="pagetitle">会议归档</h2><div class="pagedesc">每次会议 = 时间线上的一周。外层只看日期/会议名，点"看白板"进那一周；原文默认折叠、内部可见。</div><table class="t"><thead><tr><th>日期</th><th>会议</th><th>一句话</th><th></th></tr></thead><tbody>${rows}</tbody></table>`}

function filesView(){const rows=DB.files.map(f=>`<tr><td class="small">${esc(f.date)}</td><td><span class="tag lo">${esc(f.kind)}</span></td><td>${esc(f.title)}</td><td>${f.vis==="内部"?'<span class="tag soft">内部</span>':'<span class="tag ok">客户可见</span>'}</td></tr>`).join("");return topbar(`<b>COCO</b> · 物料`)+`<h2 class="pagetitle">物料</h2><div class="pagedesc">上传的原文件 + 分析：会议转录、聊天记录（内部语料）、文档。视频只存链接。聊天记录/转录默认内部、不上客户视图。</div><table class="t"><thead><tr><th>日期</th><th>类型</th><th>标题</th><th>可见性</th></tr></thead><tbody>${rows}</tbody></table>`}

function submitView(){return topbar(`<b>COCO</b> · 录入`)+`<h2 class="pagetitle">录入</h2><div class="pagedesc">两种方式：①「随手记」一句话丢进去，AI 自动归类；② 丢一段会议转录 / 群聊，AI 抽出本周的交付/事项/数据。手动表单只是补充。</div>
 <div class="quickbox"><div class="small" style="margin-bottom:6px">随手记（推荐）</div><textarea placeholder="例：今天交付了 VC 文章抓取页，给 COCO 6 篇本周阅读列表 —— 或者直接粘一段群聊/会议片段"></textarea><div class="aihint">↳ AI 会判断这是交付 / 客户事项 / 数据点，自动归类填好，你确认即可。</div><div style="margin-top:10px"><button class="submitbtn">AI 归类并预填</button></div></div>
 <div class="form"><div class="small" style="margin-bottom:10px">或手动登记一条交付</div>
  <div class="fr"><label>类型</label><select><option>社媒发布</option><option>视频</option><option>SEO页面</option><option>深度报告</option><option>个人IP内容</option><option>活动支持</option><option>方案文档</option></select></div>
  <div class="row2"><div class="fr"><label>负责人（本客户核心，可展开选全员）</label><select><option>侯明真</option><option>田长举</option><option>周星星</option><option>李阳阳</option><option>李家乐</option><option>吕教东</option><option>代逸如（帮忙）</option></select></div><div class="fr"><label>日期</label><input value="2026-06-05"></div></div>
  <div class="fr"><label>一句话说明（必填）</label><input placeholder="例：ICP 案例页第二批上线"></div>
  <div class="fr"><label>已发布链接（选填，自动显示平台 ↗）</label><input placeholder="https://"></div>
  <button class="submitbtn">提交</button></div>`}

function rosterView(){const rows=DB.roster.members.map(m=>`<tr><td>${who(m.name)}</td><td>${esc(m.role)}</td><td class="small">${esc(m.group)}</td></tr>`).join("");const hp=DB.roster.helpers.map(h=>`<tr><td>${who(h.name)}</td><td><span class="tag fresh">帮忙</span></td><td class="small">${esc(h.note)}</td></tr>`).join("");const lf=DB.roster.left.map(l=>`<tr><td>${who(l.name)}</td><td><span class="tag lo">已离职</span></td><td class="small">${esc(l.note)}</td></tr>`).join("");return topbar(`<b>COCO</b> · 团队名单`)+`<h2 class="pagetitle">团队名单</h2><div class="pagedesc">本客户核心成员引用全公司全员名单（/team.yaml）。负责人 ${esc(DB.roster.lead)} · 把关 ${esc(DB.roster.reviewer)}。增删人改一处、全站联动。</div><table class="t"><thead><tr><th>成员</th><th>本客户角色</th><th>所属组</th></tr></thead><tbody>${rows}${hp}${lf}</tbody></table>`}

render();
</script>
</body>
</html>
