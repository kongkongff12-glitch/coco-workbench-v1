<style>
:root{
  --bg:#f6f3ec;
  --panel:#fffdf8;
  --panel2:#fbf7ef;
  --ink:#211c15;
  --sub:#6b6257;
  --faint:#9b9286;
  --line:#ded6c8;
  --line2:#eee5d8;
  --red:#b54032;
  --red-bg:#fff0ed;
  --green:#2f6f52;
  --green-bg:#edf7f1;
  --blue:#345f8d;
  --blue-bg:#edf3fb;
  --gold:#8d6818;
  --gold-bg:#fff7df;
  --shadow:0 14px 34px rgba(36,29,20,.07);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;font-size:14px;line-height:1.55}
a{color:var(--blue);text-decoration:none}
button,input,select,textarea{font:inherit}
.app{display:grid;grid-template-columns:232px minmax(0,1fr);min-height:100vh}
.side{border-right:1px solid var(--line);background:#f2eee5;position:sticky;top:0;height:100vh;padding:18px 12px;overflow:auto}
.brand{padding:4px 8px 18px;border-bottom:1px solid var(--line);margin-bottom:14px}
.brand h1{font-size:20px;line-height:1.2;margin:0 0 6px;font-weight:800;letter-spacing:0}
.brand .tagline{font-size:12px;color:var(--sub)}
.brand .ver{font-size:11px;color:var(--faint);margin-top:7px}
.glabel{font-size:11px;color:var(--faint);letter-spacing:1.5px;padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:var(--sub);min-height:34px}
.nav-item:hover{background:#ebe4d8}
.nav-item.on{background:var(--ink);color:#fffaf1}
.nav-item .cnt{margin-left:auto;font-size:11px;color:var(--faint)}
.nav-item.on .cnt{color:#d6cebf}
.main{padding:22px 28px 42px;min-width:0}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
.crumb{font-size:13px;color:var(--sub)}
.switch{display:flex;background:#ebe4d8;border:1px solid var(--line);padding:3px;border-radius:8px}
.switch button{border:0;background:transparent;color:var(--sub);border-radius:6px;padding:6px 10px;cursor:pointer}
.switch button.on{background:var(--ink);color:#fffaf1}
.pagetitle{font-size:26px;line-height:1.18;margin:0 0 6px;font-weight:800;letter-spacing:0}
.pagedesc{color:var(--sub);margin:0 0 18px;max-width:980px}
.grid{display:grid;gap:14px}
.grid.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}
.grid.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}
.section{background:var(--panel);border:1px solid var(--line);border-radius:8px;margin:14px 0;overflow:hidden}
.shead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1px solid var(--line2);padding:13px 16px}
.shead h3{font-size:16px;margin:0;font-weight:800}
.hint{font-size:12px;color:var(--faint);white-space:nowrap}
.sbody{padding:14px 16px}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:13px 14px;min-height:96px}
.metric .v{font-size:24px;font-weight:800;line-height:1.1;margin-bottom:7px}
.metric .l{font-size:12px;color:var(--sub)}
.metric.good .v{color:var(--green)}
.metric.warn .v{color:var(--gold)}
.metric.bad .v{color:var(--red)}
.client-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px;cursor:pointer;box-shadow:var(--shadow)}
.client-card.dim{opacity:.58;box-shadow:none;cursor:default}
.client-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}
.client-name{font-size:18px;font-weight:800}
.fee{font-size:12px;color:var(--sub);padding-top:3px}
.client-one{font-size:14px;min-height:44px}
.client-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-top:1px solid var(--line2);margin-top:13px;padding-top:11px;color:var(--sub);font-size:12px}
.redflag{color:var(--red);font-weight:700}
.boardlayout{display:grid;grid-template-columns:306px minmax(0,1fr);gap:16px;align-items:start}
.weeklist{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;position:sticky;top:18px}
.week{border-bottom:1px solid var(--line2);padding:12px 13px;cursor:pointer}
.week:last-child{border-bottom:0}
.week:hover{background:#fbf3e6}
.week.on{background:#211c15;color:#fffaf1}
.week .date{font-weight:800;font-size:15px}
.week .title{font-size:13px;margin-top:2px}
.week .one{font-size:12px;color:var(--sub);margin-top:6px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.week.on .one{color:#d8d0c0}
.badge{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12px;color:var(--sub);background:#fffaf1}
.badge.red{border-color:#ecc5bf;color:var(--red);background:var(--red-bg)}
.badge.green{border-color:#c9e5d2;color:var(--green);background:var(--green-bg)}
.badge.blue{border-color:#cadbec;color:var(--blue);background:var(--blue-bg)}
.badge.gold{border-color:#ead58d;color:var(--gold);background:var(--gold-bg)}
.board-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px}
.board-date{font-size:22px;font-weight:800;line-height:1}
.board-title{font-size:14px;color:var(--sub);margin-top:5px}
.oneliner{background:#fff8e6;border:1px solid #e7d19a;border-radius:8px;padding:14px 16px;font-size:17px;font-weight:700;line-height:1.55;margin:14px 0}
.focus-list{display:grid;gap:8px}
.focus-item{display:flex;gap:9px;align-items:flex-start;border-bottom:1px solid var(--line2);padding-bottom:8px}
.focus-item:last-child{border-bottom:0;padding-bottom:0}
.num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fffaf1;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:0 0 auto;margin-top:1px}
.priority-list{display:grid;gap:10px}
.p-card{border:1px solid var(--line);border-radius:8px;background:var(--panel);overflow:hidden}
.p-main{display:grid;grid-template-columns:56px minmax(0,1fr) 178px;gap:12px;padding:13px 14px;align-items:start}
.p-label{font-weight:800;text-align:center;border-radius:6px;padding:5px 0;font-size:13px}
.P0{background:var(--red-bg);color:var(--red)}
.P1{background:var(--green-bg);color:var(--green)}
.P2{background:var(--blue-bg);color:var(--blue)}
.P3{background:#f1eee8;color:var(--sub)}
.p-title{font-size:15px;font-weight:800;margin-bottom:4px}
.p-summary{color:var(--sub)}
.p-meta{font-size:12px;color:var(--sub);display:grid;gap:5px}
.owner{font-weight:700;color:var(--ink)}
.next{margin-top:8px;background:var(--panel2);border:1px solid var(--line2);border-radius:6px;padding:8px 10px;color:var(--ink)}
details.evidence{border-top:1px solid var(--line2);background:#fffbf4}
details.evidence summary{cursor:pointer;padding:9px 14px;color:var(--blue);font-weight:700;list-style:none}
details.evidence summary::-webkit-details-marker{display:none}
.ev-body{padding:0 14px 12px;color:var(--sub);display:grid;gap:8px}
.quote{border-left:3px solid var(--line);padding:7px 10px;background:#fff;white-space:pre-wrap}
.linkrow{display:flex;gap:8px;flex-wrap:wrap}
.linkchip{display:inline-flex;align-items:center;min-height:28px;border:1px solid #cadbec;background:var(--blue-bg);border-radius:6px;padding:4px 8px;color:var(--blue);font-size:12px}
.todo-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.todo-col{border:1px solid var(--line);border-radius:8px;background:var(--panel);overflow:hidden}
.todo-h{font-weight:800;padding:11px 12px;border-bottom:1px solid var(--line2)}
.todo-item{padding:11px 12px;border-bottom:1px solid var(--line2)}
.todo-item:last-child{border-bottom:0}
.todo-text{font-weight:700}
.todo-meta{margin-top:5px;color:var(--sub);font-size:12px}
.psych-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.psych{border:1px solid var(--line);border-radius:8px;background:var(--panel2);padding:12px}
.psych .k{font-size:12px;color:var(--faint);margin-bottom:5px}
.psych .v{font-weight:700}
.talk-list{display:grid;gap:9px}
.talk-item{display:grid;grid-template-columns:28px minmax(0,1fr);gap:10px}
.talk-item .dot{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.table{width:100%;border-collapse:collapse;background:var(--panel)}
.table th,.table td{border-bottom:1px solid var(--line2);padding:10px;text-align:left;vertical-align:top}
.table th{font-size:12px;color:var(--sub);background:var(--panel2);font-weight:700}
.table tr:last-child td{border-bottom:0}
.timeline{display:grid;gap:0;border-left:2px solid var(--line);margin-left:12px}
.event{display:grid;grid-template-columns:88px minmax(0,1fr);gap:14px;position:relative;padding:0 0 16px 18px}
.event:before{content:"";position:absolute;left:-7px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--ink);border:2px solid var(--bg)}
.event-time{font-size:12px;color:var(--sub)}
.event-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px}
.event-title{font-weight:800;margin-bottom:4px}
.event-text{color:var(--sub)}
.deliver-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.deliver{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:13px}
.deliver .kind{font-size:12px;color:var(--faint);margin-bottom:5px}
.deliver .title{font-weight:800}
.deliver .desc{color:var(--sub);margin-top:6px}
.deliver .foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:var(--sub)}
.status-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.status-box{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:13px}
.status-box .name{font-weight:800;margin-bottom:5px}
.status-box .state{font-size:12px;color:var(--sub)}
.formgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.field{display:grid;gap:5px}
.field label{font-size:12px;color:var(--sub)}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;padding:9px 10px;color:var(--ink)}
.field textarea{min-height:118px;resize:vertical}
.btn{border:1px solid var(--ink);background:var(--ink);color:#fffaf1;border-radius:6px;padding:8px 12px;cursor:pointer}
.btn.secondary{background:var(--panel);color:var(--ink)}
.draft-list{display:grid;gap:8px;margin-top:10px}
.draft{border:1px solid var(--line);border-radius:8px;background:var(--panel2);padding:10px}
.small{font-size:12px;color:var(--sub)}
.empty{color:var(--faint);padding:10px;border:1px dashed var(--line);border-radius:8px}
@media (max-width:1100px){
  .app{grid-template-columns:1fr}
  .side{position:relative;height:auto;display:block}
  .boardlayout,.grid.cols4,.grid.cols3,.grid.cols2,.todo-grid,.psych-grid,.deliver-grid,.status-grid,.formgrid{grid-template-columns:1fr}
  .weeklist{position:relative;top:auto}
  .p-main{grid-template-columns:48px minmax(0,1fr)}
  .p-meta{grid-column:2}
}
</style>
</head>

let route=location.hash.replace("#","")||"board";
let mode="team";
let selWeek=0;
const NAV={
  "核心":["overview","board"],
  "进展":["feed","requests","deliverables","data"],
  "操作":["submit"]
};
const VIEWS={overview:"全客户总览",board:"客户白板",feed:"工作动态",requests:"客户事项",deliverables:"交付与内容库",data:"数据中心",submit:"录入"};
const $=s=>document.querySelector(s);
function esc(s){return String(s??"").replace(/[<>&"]/g,m=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[m]))}
function color(n){return DB.team[n]||"#8a8276"}
function av(n){return `<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${color(n)};color:#fffaf1;font-size:11px;font-weight:800">${esc((n||"?")[0])}</span>`}
function who(n){return `<span style="display:inline-flex;align-items:center;gap:5px">${av(n)}<span>${esc(n)}</span></span>`}
function badge(text,cls=""){return `<span class="badge ${cls}">${esc(text)}</span>`}
function link(u,l){return u?`<a class="linkchip" href="${esc(u)}" target="_blank" rel="noopener">${esc(l)}</a>`:`<span class="badge">${esc(l)}待补</span>`}
function topbar(c){return `<div class="topbar"><div class="crumb">${c}</div><div class="switch"><button class="${mode==="team"?"on":""}" data-mode="team">团队视图</button><button class="${mode==="client"?"on":""}" data-mode="client">客户视图</button></div></div>`}
function go(v){route=v;location.hash=v;render();window.scrollTo(0,0)}
function setMode(m){mode=m;render()}
function pickWeek(i){selWeek=i;render()}
function renderSide(){
  const cnt={requests:DB.requests.filter(x=>x.status!=="已闭环").length};
  const item=k=>`<div class="nav-item ${route===k?"on":""}" data-go="${k}">${VIEWS[k]}${cnt[k]?`<span class="cnt">${cnt[k]}</span>`:""}</div>`;
  const groups=Object.entries(NAV).map(([g,ks])=>`<div class="navgroup"><div class="glabel">${g}</div>${ks.map(item).join("")}</div>`).join("");
  $("#sidebar").innerHTML=`<div class="brand"><h1>COCO 客户工作台</h1><div class="tagline">周白板 · 客户进展 · 录入同步</div><div class="ver">${esc(DB.meta.version)} · 更新 ${esc(DB.meta.updated)}</div></div>${groups}`;
}
function bind(){
  document.querySelectorAll("[data-go]").forEach(e=>e.onclick=()=>go(e.dataset.go));
  document.querySelectorAll("[data-mode]").forEach(e=>e.onclick=()=>setMode(e.dataset.mode));
  document.querySelectorAll("[data-wk]").forEach(e=>e.onclick=()=>pickWeek(Number(e.dataset.wk)));
  const form=$("#entry-form");
  if(form)form.onsubmit=saveDraft;
}
function render(){
  renderSide();
  const fn={overview:overviewView,board:boardView,feed:feedView,requests:requestsView,deliverables:deliverablesView,data:dataView,submit:submitView}[route]||boardView;
  $("#main").innerHTML=fn();
  bind();
}
function overviewView(){
  const cards=DB.clients.map(c=>`<div class="client-card ${c.dim?"dim":""}" ${c.dim?"":'data-go="board"'}>
    <div class="client-top"><div><div class="client-name">${esc(c.name)}</div><div class="small">${esc(c.stage)}</div></div><div class="fee">${esc(c.fee)}/月</div></div>
    <div class="client-one">${esc(c.one)}</div>
    <div class="client-meta">${who(c.lead)}<span>下次会 ${esc(c.next)}</span>${c.red?`<span class="redflag">${c.red} 项红灯</span>`:"<span>无红灯</span>"}</div>
  </div>`).join("");
  return topbar("全客户总览")+`
    <h2 class="pagetitle">全客户总览</h2>
    <p class="pagedesc">每个客户只保留一句话现状、负责人、阶段和红灯。COCO 是当前试点，点卡片进入白板。</p>
    <div class="grid cols3">${cards}</div>`;
}
function boardView(){
  const kpis=DB.current.kpis.map(k=>`<div class="metric ${k.t}"><div class="v">${esc(k.v)}</div><div class="l">${esc(k.l)}</div></div>`).join("");
  const weeks=DB.weeks.map((w,i)=>`<div class="week ${i===selWeek?"on":""}" data-wk="${i}">
    <div class="date">${esc(w.date.slice(5))}</div><div class="title">${esc(w.title)}</div><div class="one">${esc(w.one)}</div>
  </div>`).join("");
  return topbar("COCO · 客户白板")+`
    <h2 class="pagetitle">客户白板</h2>
    <p class="pagedesc">按周看白板。默认先看本周判断和重点，再看按重要度排序的事项、双方待办和下次会议讲法。</p>
    <div class="grid cols4">${kpis}</div>
    <div class="boardlayout" style="margin-top:16px"><div class="weeklist">${weeks}</div><div>${weekPanel(DB.weeks[selWeek])}</div></div>`;
}
function weekPanel(w){
  const focus=w.focus.map((f,i)=>`<div class="focus-item"><span class="num">${i+1}</span><div>${esc(f)}</div></div>`).join("");
  const cards=w.priorities.map(priorityCard).join("");
  return `<div class="board-head"><div><div class="board-date">${esc(w.date)}</div><div class="board-title">${esc(w.title)}</div></div><div>${badge(w.badge||"白板","blue")}</div></div>
    <div class="oneliner">${esc(w.one)}</div>
    <div class="section"><div class="shead"><h3>最近讨论重点</h3><span class="hint">只保留可用于开会的判断</span></div><div class="sbody"><div class="focus-list">${focus}</div></div></div>
    <div class="section"><div class="shead"><h3>按重要度排序</h3><span class="hint">P0 先讲，P3 不抢主视觉</span></div><div class="sbody"><div class="priority-list">${cards}</div></div></div>
    ${todoBlock(w.todos)}
    ${psychBlock(w.psychology)}
    ${talkBlock(w.meetingTalk)}`;
}
function priorityCard(c){
  const links=(c.links||[]).length?`<div class="linkrow">${c.links.map(x=>link(x.url,x.label)).join("")}</div>`:"";
  const ev=(c.evidence||[]).length?`<details class="evidence"><summary>展开依据 / 源文档</summary><div class="ev-body">${links}${c.evidence.map(e=>`<div><div class="small">${esc(e.label)}</div><div class="quote">${esc(e.text)}</div></div>`).join("")}</div></details>`:"";
  return `<div class="p-card"><div class="p-main"><div class="p-label ${esc(c.p)}">${esc(c.p)}</div><div><div class="p-title">${esc(c.title)}</div><div class="p-summary">${esc(c.summary)}</div><div class="next">下一步：${esc(c.next)}</div></div><div class="p-meta"><div>负责人：<span class="owner">${esc(c.owner)}</span></div><div>状态：${badge(c.status,c.p==="P0"?"red":c.p==="P1"?"green":"blue")}</div></div></div>${ev}</div>`;
}
function todoBlock(t){
  const col=(title,arr,cls)=>`<div class="todo-col"><div class="todo-h">${esc(title)}</div>${arr.map(x=>`<div class="todo-item"><div class="todo-text">${esc(x.text)}</div><div class="todo-meta">${esc(x.owner)} · ${esc(x.due)} · ${badge(x.state,cls)}</div></div>`).join("")}</div>`;
  return `<div class="section"><div class="shead"><h3>双方待办</h3><span class="hint">写清一句话，不显示空数量</span></div><div class="sbody"><div class="todo-grid">${col("我方待办",t.us,"blue")}${col("客户待办",t.client,"gold")}${col("双方待确认",t.confirm,"red")}</div></div></div>`;
}
function psychBlock(p){
  return `<div class="section"><div class="shead"><h3>客户心理变化</h3><span class="hint">关注点变化，不复述聊天</span></div><div class="sbody"><div class="psych-grid">
    <div class="psych"><div class="k">之前关注</div><div class="v">${esc(p.before)}</div></div>
    <div class="psych"><div class="k">现在关注</div><div class="v">${esc(p.now)}</div></div>
    <div class="psych"><div class="k">变化原因</div><div class="v">${esc(p.why)}</div></div>
    <div class="psych"><div class="k">我方应对</div><div class="v">${esc(p.response)}</div></div>
  </div></div></div>`;
}
function talkBlock(items){
  return `<div class="section"><div class="shead"><h3>下次会议讲法</h3><span class="hint">可以直接按这个顺序过会</span></div><div class="sbody"><div class="talk-list">${items.map((x,i)=>`<div class="talk-item"><span class="dot">${i+1}</span><div>${esc(x)}</div></div>`).join("")}</div></div></div>`;
}
function feedView(){
  const list=DB.events.map(e=>`<div class="event"><div class="event-time">${esc(e.date)}<br>${esc(e.time)}</div><div class="event-card"><div class="linkrow" style="margin-bottom:6px">${badge(e.type,"blue")}${badge(e.line)}</div><div class="event-title">${esc(e.title)}</div><div class="event-text">${esc(e.text)}</div><div class="small" style="margin-top:8px">${esc(e.who)}</div></div></div>`).join("");
  return topbar("COCO · 工作动态")+`<h2 class="pagetitle">工作动态</h2><p class="pagedesc">只保留客户新要求、交付、关键数据变化和风险。微信群不复刻，只抽关键事项。</p><div class="timeline">${list}</div>`;
}
function requestsView(){
  const rows=DB.requests.map(r=>`<tr><td>${esc(r.date)}</td><td>${esc(r.source)}</td><td><b>${esc(r.need)}</b><div class="small">${esc(r.judge)}</div></td><td>${esc(r.owner)}</td><td>${badge(r.status,r.status==="待对齐"?"red":"blue")}</td><td>${esc(r.next)}</td></tr>`).join("");
  return topbar("COCO · 客户事项")+`<h2 class="pagetitle">客户事项</h2><p class="pagedesc">只放需要闭环的客户开口事项；已闭环内容不抢白板位置。</p><div class="section"><table class="table"><thead><tr><th>日期</th><th>来源</th><th>事项与真实需求</th><th>负责人</th><th>状态</th><th>下一步</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function deliverablesView(){
  const cards=DB.deliveries.map(d=>`<div class="deliver"><div class="kind">${esc(d.date)} · ${esc(d.kind)}</div><div class="title">${esc(d.title)}</div><div class="desc">${esc(d.desc)}</div>${d.links?`<div class="linkrow" style="margin-top:10px">${d.links.map(x=>link(x.url,x.label)).join("")}</div>`:""}<div class="foot"><span>${esc(d.owner)}</span>${badge(d.status,d.status==="已发布"||d.status==="已收集"?"green":"blue")}</div></div>`).join("");
  return topbar("COCO · 交付与内容库")+`<h2 class="pagetitle">交付与内容库</h2><p class="pagedesc">按能汇报、能复用、能追溯的口径整理，不展示无意义历史总数。</p><div class="deliver-grid">${cards}</div>`;
}
function dataView(){
  const boxes=DB.data.map(d=>`<div class="status-box"><div class="name">${esc(d.name)}</div><div class="state">状态：${badge(d.state,d.state==="已接入"?"green":d.state==="未收录"?"red":"gold")}</div><div class="small" style="margin-top:8px">负责人：${esc(d.owner)}</div><div style="margin-top:8px">${esc(d.note)}</div>${d.link?`<div class="linkrow" style="margin-top:10px">${link(d.link,"打开看板")}</div>`:""}</div>`).join("");
  return topbar("COCO · 数据中心")+`<h2 class="pagetitle">数据中心</h2><p class="pagedesc">只展示会影响判断的数据源。没有接通的明确标出，不用假趋势。</p><div class="status-grid">${boxes}</div>`;
}
function submitView(){
  const drafts=getDrafts().map(d=>`<div class="draft"><b>${esc(d.type)}</b> · ${esc(d.client)} · ${esc(d.owner)}<div>${esc(d.text)}</div><div class="small">${esc(d.time)}</div></div>`).join("")||`<div class="empty">暂无本机草稿</div>`;
  return topbar("COCO · 录入")+`<h2 class="pagetitle">录入</h2><p class="pagedesc">负责人和成员只录一次：交付、客户要求、数据点、文件链接。后续接飞书后会自动同步到全员白板。</p>
  <div class="section"><div class="shead"><h3>快速录入</h3><span class="hint">先做本机草稿，飞书接口接入后同步</span></div><div class="sbody">
    <form id="entry-form">
      <div class="formgrid">
        <div class="field"><label>客户</label><select name="client"><option>COCO</option></select></div>
        <div class="field"><label>类型</label><select name="type"><option>交付</option><option>客户要求</option><option>数据点</option><option>文件 / 链接</option><option>会议片段 / 群聊片段</option></select></div>
        <div class="field"><label>负责人</label><select name="owner"><option>侯明真</option><option>周星星</option><option>李阳阳</option><option>李家乐</option><option>Owen</option><option>Alex</option><option>Will 团队</option></select></div>
        <div class="field"><label>是否进入本周白板</label><select name="board"><option>是</option><option>否</option><option>待判断</option></select></div>
      </div>
      <div class="field" style="margin-top:12px"><label>一句话说明或粘贴片段</label><textarea name="text" placeholder="例如：Charlie 要求把 SuperAI 活动资料整理成英文 thread，并 tag Google / 非凡 / AGI Villa。"></textarea></div>
      <div style="margin-top:12px;display:flex;gap:8px"><button class="btn" type="submit">保存草稿</button><button class="btn secondary" type="button" onclick="clearDrafts()">清空草稿</button></div>
    </form>
  </div></div>
  <div class="section"><div class="shead"><h3>待同步草稿</h3><span class="hint">当前浏览器</span></div><div class="sbody"><div class="draft-list">${drafts}</div></div></div>`;
}
function getDrafts(){try{return JSON.parse(localStorage.getItem("cocoDrafts")||"[]")}catch(e){return[]}}
function saveDraft(e){
  e.preventDefault();
  const f=new FormData(e.target);
  const item={client:f.get("client"),type:f.get("type"),owner:f.get("owner"),board:f.get("board"),text:f.get("text"),time:new Date().toLocaleString("zh-CN")};
  const arr=getDrafts();
  if(item.text.trim())arr.unshift(item);
  localStorage.setItem("cocoDrafts",JSON.stringify(arr.slice(0,20)));
  render();
}
function clearDrafts(){localStorage.removeItem("cocoDrafts");render()}
window.addEventListener("hashchange",()=>{route=location.hash.replace("#","")||"board";render()});
render();
</script>
</body>
</html>
